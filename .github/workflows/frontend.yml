name: App - Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/sustainability-web/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Build & Publish Angular Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Terraform (Solo para leer outputs)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Install Monorepo Dependencies
        env:
          NPM_CONFIG_LEGACY_PEPS: "true"
        run: |
          echo "📦 Instalando dependencias completas (incluyendo devDependencies)..."
          npm ci --include=dev

      - name: Build Monorepo Dependencies & Frontend
        env:
          NODE_OPTIONS: "--max_old_space_size=40 Wel96"
        run: |
          echo "📦 Compilando librerías compartidas necesarias para el Frontend..."
          node ./node_modules/nx/bin/nx.js run-many -t build --projects=common,domain,application,infrastructure
          
          echo "🚀 Compilando el Frontend forzando el script raíz sin contexto de Workspaces..."
          npm run ng:build:front --no-workspaces
          
      - name: Dump NPM Debug Log on Failure
        if: failure()
        run: |
          find /home/runner/.npm/_logs/ -name "*.log" -type f | while read file; do
            cat "$file"
          done

      - name: Extract Target AWS Infrastructure Config
        id: infra_config
        run: |
          terraform init -input=false
          BUCKET=$(terraform output -raw s3_bucket_name | tr -d '[:space:]')
          DIST_ID=$(terraform output -raw cloudfront_distribution_id | tr -d '[:space:]')
          
          echo "bucket_name=$BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$DIST_ID" >> $GITHUB_OUTPUT
        working-directory: ./terraform

      - name: Sync S3 and Invalidate CloudFront
        run: |
          REAL_DIST_PATH=$(find . -path "*/dist/apps/sustainability-web/browser" -type d | head -n 1)
          if [ -z "$REAL_DIST_PATH" ]; then
            REAL_DIST_PATH=$(find . -path "*/dist/sustainability-web/browser" -type d | head -n 1)
          fi
          if [ -z "$REAL_DIST_PATH" ]; then
            REAL_DIST_PATH=$(find . -name "index.html" | grep "/dist/" | head -n 1 | xargs dirname)
          fi

          echo "🚀 Sincronizando distribución desde: $REAL_DIST_PATH"
          
          aws s3 sync "$REAL_DIST_PATH" s3://${{ steps.infra_config.outputs.bucket_name }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ steps.infra_config.outputs.cloudfront_id }} --paths "/*"