name: App - Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/sustainability-web/**'
      - 'libs/**'
      - 'angular.json'
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Build & Publish Angular Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Install monorepo dependencies
        run: npm ci --include=dev

      - name: Verify Nx workspace
        run: |
          npx nx --version
          npx nx show projects

      - name: Build shared libraries
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          npx nx run-many \
            --target=build \
            --projects=common,domain,application,infrastructure \
            --parallel=2

      - name: Build frontend application
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          npx nx build sustainability-web --configuration=production

      - name: Extract Terraform outputs
        id: infra_config
        run: |
          terraform init -input=false
          BUCKET=$(terraform output -raw s3_bucket_name | tr -d '[:space:]')
          DIST_ID=$(terraform output -raw cloudfront_distribution_id | tr -d '[:space:]')
          echo "bucket_name=$BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$DIST_ID" >> $GITHUB_OUTPUT
        working-directory: ./terraform

      - name: Sync S3 and invalidate CloudFront
        run: |
          REAL_DIST_PATH=$(find . -path "*/dist/apps/sustainability-web/browser" -type d | head -n 1)
          if [ -z "$REAL_DIST_PATH" ]; then
            REAL_DIST_PATH=$(find . -path "*/dist/apps/sustainability-web" -name "index.html" | head -n 1 | xargs dirname)
          fi
          if [ -z "$REAL_DIST_PATH" ]; then
            echo "ERROR: Could not locate frontend dist folder"
            find dist -type f | head -30
            exit 1
          fi
          echo "Frontend dist path: $REAL_DIST_PATH"
          aws s3 sync "$REAL_DIST_PATH" s3://${{ steps.infra_config.outputs.bucket_name }} --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.infra_config.outputs.cloudfront_id }} \
            --paths "/*"
