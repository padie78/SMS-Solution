name: Terraform & Frontend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Infrastructure & Web Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Preparación del Entorno
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/sustainability-web/package.json

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false 

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 2. Infraestructura con Terraform
      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform

      # 3. Construcción del Frontend (Angular)
      - name: Install Frontend Dependencies
        run: npm install --no-audit --no-fund
        working-directory: apps/sustainability-web

      - name: Build Angular App
        run: npm run build -- --configuration production
        working-directory: apps/sustainability-web

      # 4. Despliegue de Activos a AWS
     # 4a. Capturar variables de infraestructura y exponerlas como outputs del step
      - name: Export Terraform Outputs
        id: tf_outputs
        run: |
          # Obtenemos los valores y los limpiamos
          BUCKET=$(terraform output -raw s3_bucket_name | tr -d '[:space:]')
          DIST_ID=$(terraform output -raw cloudfront_distribution_id | tr -d '[:space:]')
          
          # Validamos que no estén vacíos
          if [ -z "$BUCKET" ] || [ -z "$DIST_ID" ]; then
            echo "❌ ERROR: Outputs de Terraform no encontrados."
            exit 1
          fi

          # Seteamos los outputs del step usando el nuevo formato de GitHub
          echo "bucket_name=$BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$DIST_ID" >> $GITHUB_OUTPUT
        working-directory: ./terraform

      # 4b. Sincronizar S3 e Invalidar CloudFront usando la referencia del step anterior
      # 4b. Sincronizar S3 e Invalidar CloudFront
      - name: Sync S3 and Invalidate CloudFront
        run: |
          # 1. BUSCADOR AUTOMÁTICO DE LA CARPETA DIST
          # Buscamos el index.html que genera el build y tomamos su carpeta
          REAL_DIST_PATH=$(find . -name "index.html" | grep "/dist/" | head -n 1 | xargs dirname)

          if [ -z "$REAL_DIST_PATH" ]; then
            echo "❌ ERROR: No se encontró el index.html en ninguna carpeta 'dist'."
            echo "Listado de archivos para diagnóstico:"
            ls -R
            exit 1
          fi

          echo "✅ Carpeta de build encontrada en: $REAL_DIST_PATH"
          echo "🚀 Subiendo a: ${{ steps.tf_outputs.outputs.bucket_name }}"

          # 2. Sincronizar usando la ruta encontrada
          aws s3 sync "$REAL_DIST_PATH" s3://${{ steps.tf_outputs.outputs.bucket_name }} --delete

          # 3. Invalidar CloudFront
          echo "🧹 Invalidando: ${{ steps.tf_outputs.outputs.cloudfront_id }}"
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cloudfront_id }} \
            --paths "/*"