name: Terraform & Frontend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Infrastructure & Web Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Preparación del Entorno
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Importante para que Nx pueda calcular qué cambió

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Cacheamos el lockfile raíz únicamente
          cache-dependency-path: package-lock.json

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false 

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 2. Instalación y Build del Monorepo (RAÍZ)
      # Esto crea los symlinks locales y evita que npm busque @sms/* en internet
      - name: Install Monorepo Dependencies
        run: npm ci --no-audit --no-fund
        working-directory: .

      - name: Build Libraries and Lambdas
        # Ejecutamos el build de todas las piezas necesarias
        # Nx se encarga de buildear common, domain, etc., antes que las lambdas
        run: |
          npx nx run-many -t build --projects=common,application,domain,infrastructure,signer_lambda,dispatcher_lambda,worker_lambda
        working-directory: .

      # 3. Infraestructura con Terraform
      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform

      - name: Debug Workspace
        run: |
        ls -F node_modules/.bin/ng || echo "❌ Angular CLI no está en la raíz"
        find . -name "ng" -type f

      # 4. Construcción del Frontend (Angular)
      # Nota: Si el front está en Nx, podrías usar: npx nx build sustainability-web
      - name: Build Frontend with Nx
        run: npx nx build sustainability-web --configuration=production
        working-directory: .

      # 5. Exportar Outputs e Invalidar CloudFront
      - name: Export Terraform Outputs
        id: tf_outputs
        run: |
          BUCKET=$(terraform output -raw s3_bucket_name | tr -d '[:space:]')
          DIST_ID=$(terraform output -raw cloudfront_distribution_id | tr -d '[:space:]')
          
          if [ -z "$BUCKET" ] || [ -z "$DIST_ID" ]; then
            echo "❌ ERROR: Outputs de Terraform no encontrados."
            exit 1
          fi

          echo "bucket_name=$BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$DIST_ID" >> $GITHUB_OUTPUT
        working-directory: ./terraform

      - name: Sync S3 and Invalidate CloudFront
        run: |
          # Buscamos el index.html generado y tomamos su carpeta
          REAL_DIST_PATH=$(find . -name "index.html" | grep "/dist/" | head -n 1 | xargs dirname)

          if [ -z "$REAL_DIST_PATH" ]; then
            echo "❌ ERROR: No se encontró la carpeta dist."
            exit 1
          fi

          echo "✅ Sincronizando desde: $REAL_DIST_PATH"
          aws s3 sync "$REAL_DIST_PATH" s3://${{ steps.tf_outputs.outputs.bucket_name }} --delete

          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cloudfront_id }} \
            --paths "/*"