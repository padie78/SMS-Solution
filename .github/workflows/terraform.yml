name: Terraform & Frontend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Infrastructure & Web Deploy
    runs-on: ubuntu-latest

    steps:
      ###########################################################################
      # 1. Checkout
      ###########################################################################
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ###########################################################################
      # 2. Node.js
      ###########################################################################
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      ###########################################################################
      # 3. Terraform
      ###########################################################################
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      ###########################################################################
      # 4. AWS Credentials
      ###########################################################################
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      ###########################################################################
      # 5. Install Dependencies (¡Crucial!)
      ###########################################################################
      - name: Install Monorepo Dependencies
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"
        run: |
          echo "📦 Instalando dependencias del espacio de trabajo..."
          npm ci --include=dev

      ###########################################################################
      # 6. Configure Angular CLI Bypass
      ###########################################################################
      - name: Configure Angular CLI Bypass
        run: |
          echo "🤖 Enlazando binario local de Angular CLI al entorno global del Runner..."
          sudo ln -sf "$PWD/node_modules/.bin/ng" /usr/local/bin/ng

      ###########################################################################
      # 7. Build Backend Libraries
      ###########################################################################
      - name: Build Monorepo Libraries
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          echo "🚀 Building backend/shared libraries..."
          ./node_modules/.bin/nx run-many \
            --target=build \
            --projects=common,domain,application,infrastructure \
            --parallel=1 \
            --skip-nx-cache \
            --verbose
        working-directory: .

      ###########################################################################
      # 8. Terraform Init
      ###########################################################################
      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./terraform

      ###########################################################################
      # 9. Terraform Plan
      ###########################################################################
      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false
        working-directory: ./terraform

      ###########################################################################
      # 10. Terraform Apply
      ###########################################################################
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform

      ###########################################################################
      # 11. Registrar Angular CLI + Engine + Compilar con Nx
      ###########################################################################
      - name: Register Angular CLI & Builder and Build with Nx
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"
        run: |
          echo "📦 Inyectando Angular CLI y el Builder Engine en el Runner..."
          npm install @angular/cli@18 @angular-devkit/build-angular@18 --save-dev --legacy-peer-deps

          echo "🔎 Verificando estado del CLI:"
          npx ng version

          echo "🚀 Ejecutando el build del Frontend a través de Nx..."
          ./node_modules/.bin/nx build sustainability-web --configuration=production

          echo "✅ Frontend build completado exitosamente"
          echo "📂 Contenido del directorio dist generado:"
          ls -la dist/apps/sustainability-web 2>/dev/null || ls -la dist/sustainability-web 2>/dev/null || ls -la dist/
        working-directory: .
      ###########################################################################
      # 12. Dump NPM Logs On Failure
      ###########################################################################
      - name: Dump NPM Debug Log on Failure
        if: failure()
        run: |
          echo "📄 Dumping npm logs..."
          find /home/runner/.npm/_logs/ -name "*.log" -type f | while read file; do
            echo "=================================================="
            echo "FILE: $file"
            echo "=================================================="
            cat "$file"
            echo ""
          done

      ###########################################################################
      # 13. Export Terraform Outputs
      ###########################################################################
      - name: Export Terraform Outputs
        id: tf_outputs
        run: |
          BUCKET=$(terraform output -raw s3_bucket_name | tr -d '[:space:]')
          DIST_ID=$(terraform output -raw cloudfront_distribution_id | tr -d '[:space:]')

          if [ -z "$BUCKET" ]; then
            echo "❌ ERROR: Missing S3 bucket output"
            exit 1
          fi

          if [ -z "$DIST_ID" ]; then
            echo "❌ ERROR: Missing CloudFront distribution output"
            exit 1
          fi

          echo "bucket_name=$BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$DIST_ID" >> $GITHUB_OUTPUT

          echo "✅ Bucket: $BUCKET"
          echo "✅ CloudFront Distribution: $DIST_ID"
        working-directory: ./terraform

      ###########################################################################
      # 14. Upload Frontend to S3 + CloudFront Invalidation
      ###########################################################################
      - name: Sync S3 and Invalidate CloudFront
        run: |
          echo "🔎 Searching frontend dist folder..."

          REAL_DIST_PATH=$(find . -path "*/dist/apps/sustainability-web/browser" -type d | head -n 1)

          if [ -z "$REAL_DIST_PATH" ]; then
            REAL_DIST_PATH=$(find . -path "*/dist/sustainability-web/browser" -type d | head -n 1)
          fi

          if [ -z "$REAL_DIST_PATH" ]; then
            REAL_DIST_PATH=$(find . -name "index.html" | grep "/dist/" | head -n 1 | xargs dirname)
          fi

          if [ -z "$REAL_DIST_PATH" ]; then
            echo "❌ ERROR: Could not locate frontend dist folder"
            exit 1
          fi

          echo "✅ Frontend dist path: $REAL_DIST_PATH"

          echo "🚀 Uploading files to S3..."
          aws s3 sync \
            "$REAL_DIST_PATH" \
            s3://${{ steps.tf_outputs.outputs.bucket_name }} \
            --delete

          echo "🚀 Invalidating CloudFront cache..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cloudfront_id }} \
            --paths "/*"

          echo "✅ Deployment completed successfully"