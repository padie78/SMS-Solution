name: Terraform & Frontend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Infrastructure & Web Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Preparación del Entorno
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false 

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 2. Instalación de Dependencias Total (Raíz + Subproyectos enlazados)
      - name: Install Monorepo Dependencies
        # Usamos '--prefer-offline' para mitigar fallos de red/404 del registro de npm 
        # y forzamos la resolución general de todos los workspaces del monorepo
        run: npm install --include=dev --legacy-peer-deps --prefer-offline
        working-directory: .

      # 3. Compilación Jerárquica Estricta del Backend
      - name: Build Monorepo Components
        run: |
          ./node_modules/.bin/nx run-many -t build --projects=common,domain,application,infrastructure --parallel=1 --skip-nx-cache
        working-directory: .

      # 4. (Tus pasos de Terraform se mantienen exactamente igual aquí)

      # 5. Construcción del Frontend (Angular)
      - name: Build Frontend Application
        # Usamos variables de entorno del sistema para forzar a npm a tragar las peer-deps 
        # cuando Nx dispare internamente el comando 'npx ng build'
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npx nx build sustainability-web --configuration=production
        working-directory: .

      # 6. Exportar Outputs e Invalidar CloudFront
      - name: Export Terraform Outputs
        id: tf_outputs
        run: |
          BUCKET=$(terraform output -raw s3_bucket_name | tr -d '[:space:]')
          DIST_ID=$(terraform output -raw cloudfront_distribution_id | tr -d '[:space:]')
          
          if [ -z "$BUCKET" ] || [ -z "$DIST_ID" ]; then
            echo "❌ ERROR: Outputs de Terraform no encontrados."
            exit 1
          fi

          echo "bucket_name=$BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$DIST_ID" >> $GITHUB_OUTPUT
        working-directory: ./terraform

      - name: Sync S3 and Invalidate CloudFront
        run: |
          REAL_DIST_PATH=$(find . -name "index.html" | grep "/dist/" | head -n 1 | xargs dirname)

          if [ -z "$REAL_DIST_PATH" ]; then
            echo "❌ ERROR: No se encontró la carpeta dist."
            exit 1
          fi

          echo "✅ Sincronizando desde: $REAL_DIST_PATH"
          aws s3 sync "$REAL_DIST_PATH" s3://${{ steps.tf_outputs.outputs.bucket_name }} --delete

          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cloudfront_id }} \
            --paths "/*"