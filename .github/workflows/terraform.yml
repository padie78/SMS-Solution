name: Terraform & Frontend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecución manual desde la UI de GitHub

jobs:
  deploy:
    name: Infrastructure & Web Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Preparación del Entorno
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/sustainability-web/package.json

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false # Necesario para capturar outputs correctamente

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1 # Tu región real

      # 2. Infraestructura con Terraform
      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform

      # 3. Construcción del Frontend (Angular)
      - name: Install Frontend Dependencies
        run: npm install --no-audit --no-fund
        working-directory: apps/sustainability-web

      - name: Build Angular App
        run: npm run build -- --configuration production
        working-directory: apps/sustainability-web

      # 4. Despliegue de Activos a AWS
# 4. Despliegue de Activos a AWS
      - name: Sync S3 and Invalidate CloudFront
        run: |
          # Extraemos los valores limpiando cualquier mensaje de advertencia de Terraform
          BUCKET_NAME=$(terraform output -raw s3_bucket_name | tail -n 1 | tr -d '\r')
          DIST_ID=$(terraform output -raw cloudfront_distribution_id | tail -n 1 | tr -d '\r')
          
          echo "🚀 Desplegando en S3: $BUCKET_NAME"
          
          # IMPORTANTE: Validamos que la carpeta exista antes de sincronizar
          # En Angular 17+, la ruta suele ser dist/sustainability-web/browser
          if [ -d "../apps/sustainability-web/dist/sustainability-web/browser" ]; then
            SOURCE_PATH="../apps/sustainability-web/dist/sustainability-web/browser"
          else
            SOURCE_PATH="../apps/sustainability-web/dist/sustainability-web"
          fi

          echo "📂 Usando carpeta de origen: $SOURCE_PATH"

          # Sincronización
          aws s3 sync $SOURCE_PATH s3://$BUCKET_NAME --delete
          
          # Invalidación de cache
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
        working-directory: ./terraform