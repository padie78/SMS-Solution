name: Terraform CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: # Te recomiendo dejarlo activo para pruebas manuales

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- NUEVO PASO: GENERAR EL ZIP MANUALMENTE ---
      # Esto asegura que el package.json y el código nuevo entren al paquete
      - name: Prepare Lambda Package
        run: |
          cd lambda_code/analytics_lambda
          zip -r ../../analytics_lambda.zip . 
          # El ZIP queda en la raíz del repo para que Terraform lo encuentre
        
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform