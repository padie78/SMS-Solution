name: App - Lambdas Hot-Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'lambda_code/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
  workflow_dispatch:

jobs:
  deploy-lambdas:
    name: Build & package Lambdas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Install monorepo dependencies
        run: npm ci --include=dev

      - name: Build shared libraries
        run: |
          npx nx run-many \
            --target=build \
            --projects=common,domain,application,infrastructure \
            --parallel=2

      - name: Build Lambda bundles
        run: |
          npx nx run-many \
            --target=build \
            --projects=api-lambda,worker-lambda,dispatcher-lambda,signer-lambda,analytics-lambda,kpi-engine-lambda,post-confirmation-lambda \
            --parallel=3

      - name: List Lambda artifacts
        run: find dist/lambda_code -type f | head -50
