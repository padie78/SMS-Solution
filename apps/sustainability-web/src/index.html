<div class="flex flex-col min-h-screen">
  <header class="bg-white border-b h-16 flex items-center px-6 sticky top-0 z-50 justify-between">
    <div class="flex items-center gap-4">
      <button (click)="sidebarVisible = true" class="p-2 hover:bg-slate-100 rounded-lg">
        <i class="pi pi-bars text-xl"></i>
      </button>
      <span class="font-bold text-xl text-emerald-600">SMS - Sustainability</span>
    </div>
    <div class="flex items-center gap-4">
      <i class="pi pi-bell p-overlay-badge text-slate-600"></i>
      <div class="w-8 h-8 rounded-full bg-slate-200 border flex items-center justify-center">
        <i class="pi pi-user text-slate-500"></i>
      </div>
    </div>
  </header>

  <div class="flex flex-1">
    <p-sidebar [(visible)]="sidebarVisible" [baseZIndex]="10000">
      <h3 class="font-bold text-lg mb-4">Menú Principal</h3>
      <nav class="flex flex-col gap-2">
        <a routerLink="/dashboard" class="p-3 hover:bg-emerald-50 rounded text-slate-700 flex items-center gap-3">
          <i class="pi pi-home"></i> Dashboard
        </a>
        <a routerLink="/energy" class="p-3 hover:bg-emerald-50 rounded text-slate-700 flex items-center gap-3">
          <i class="pi pi-bolt"></i> Consumo Energía
        </a>
        <a routerLink="/carbon" class="p-3 hover:bg-emerald-50 rounded text-slate-700 flex items-center gap-3">
          <i class="pi pi-globe"></i> Huella Carbono
        </a>
        <hr class="my-2">
        <a routerLink="/settings" class="p-3 hover:bg-slate-50 rounded text-slate-700 flex items-center gap-3">
          <i class="pi pi-cog"></i> Configuración
        </a>
      </nav>
    </p-sidebar>

    <main class="flex-1 p-6 bg-slate-50">
      <router-outlet></router-outlet>
    </main>
  </div>

  <footer class="bg-white border-t p-4 text-center text-slate-500 text-sm">
    © 2026 Sustainability Management System - Diego Hernan Liascovich
  </footer>
</div>
