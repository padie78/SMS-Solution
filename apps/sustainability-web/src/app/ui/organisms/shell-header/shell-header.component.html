<header
  class="bg-white border-b border-slate-200 h-14 flex items-center justify-between px-4 sticky top-0 z-50 shadow-sm"
  role="banner"
>
  <div class="flex items-center gap-3">
    <button
      type="button"
      (click)="toggleSidebar.emit()"
      class="p-2 hover:bg-slate-100 rounded-xl flex items-center justify-center transition-colors"
      aria-label="Open navigation menu"
    >
      <i class="pi pi-bars text-slate-600 text-lg" aria-hidden="true"></i>
    </button>

    <a
      class="flex items-center gap-3 cursor-pointer rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 focus-visible:ring-offset-2"
      [routerLink]="dashboardPath"
    >
      <div class="w-8 h-8 bg-emerald-600 rounded-xl flex items-center justify-center shadow-sm">
        <i class="pi pi-bolt text-white text-sm" aria-hidden="true"></i>
      </div>
      <div class="flex flex-col leading-none">
        <span class="font-bold text-slate-800 tracking-tight">SMS</span>
        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Sustainability OS</span>
      </div>
    </a>
  </div>

  <div class="flex items-center gap-3">
    <div class="hidden md:flex items-center gap-2 px-3 py-1 bg-emerald-50 border border-emerald-100 rounded-full shadow-sm">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      <span class="text-[10px] font-bold text-emerald-700 uppercase tracking-wide">Enterprise Plan</span>
    </div>

    <div class="h-6 w-px bg-slate-200" aria-hidden="true"></div>

    <button
      type="button"
      id="user-trigger"
      (click)="menu.toggle($event)"
      class="group flex items-center gap-2 p-1 pr-2 hover:bg-slate-50 border border-transparent hover:border-slate-200 rounded-xl transition-all"
      aria-haspopup="menu"
      aria-label="User account menu"
    >
      <div
        class="w-7 h-7 rounded-lg bg-slate-800 flex items-center justify-center text-[11px] font-bold text-white group-hover:bg-emerald-600 transition-colors"
        aria-hidden="true"
      >
        DH
      </div>
      <div class="hidden sm:flex flex-col items-start leading-tight text-left">
        <span class="text-xs font-bold text-slate-700">Diego Liascovich</span>
        <span class="text-[9px] text-slate-400 uppercase font-medium tracking-tighter">Personal Workspace</span>
      </div>
      <i class="pi pi-chevron-down text-[10px] text-slate-400" aria-hidden="true"></i>
    </button>

    <p-menu
      #menu
      [model]="userConfigItems"
      [popup]="true"
      appendTo="body"
      styleClass="w-64 shadow-2xl border-slate-200 mt-2 rounded-xl overflow-hidden"
    >
      <ng-template pTemplate="start">
        <div class="p-4 bg-slate-50 border-b border-slate-100 subscriber-id-box">
          <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">Subscriber ID</p>
          <p class="text-xs font-mono text-slate-600 truncate">usr_829374029312</p>
        </div>
      </ng-template>
    </p-menu>
  </div>
</header>
