<header
  class="sms-shell-header flex items-center justify-between px-4 sticky top-0 z-40 md:shadow-sm md:shadow-black/20"
  role="banner"
>
  <!-- Espacio para hamburguesa fija del sidebar en móvil (offset + ancho botón) -->
  <div class="flex items-center gap-3 pl-16 md:pl-0">
    <a
      class="flex items-center gap-3 cursor-pointer rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-950"
      [routerLink]="dashboardPath"
    >
      <div class="w-8 h-8 bg-emerald-600 rounded-xl flex items-center justify-center shadow-sm shadow-emerald-950/40">
        <i class="pi pi-bolt text-white text-sm" aria-hidden="true"></i>
      </div>
      <div class="flex flex-col leading-none">
        <span class="font-bold text-slate-100 tracking-tight">SMS</span>
        <span class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Sustainability OS</span>
      </div>
    </a>
  </div>

  <div class="flex items-center gap-3">
    <div
      class="hidden md:flex items-center gap-2 px-3 py-1 bg-emerald-950/40 border border-emerald-800/80 rounded-full shadow-sm"
    >
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      <span class="text-[10px] font-bold text-emerald-300 uppercase tracking-wide">Enterprise Plan</span>
    </div>

    <div class="h-6 w-px bg-slate-700" aria-hidden="true"></div>

    <button
      type="button"
      id="user-trigger"
      (click)="menu.toggle($event)"
      class="group flex items-center gap-2 p-1 pr-2 hover:bg-slate-800 border border-transparent hover:border-slate-600 rounded-xl transition-all"
      aria-haspopup="menu"
      aria-label="Menú de cuenta"
    >
      <div
        class="w-7 h-7 rounded-lg bg-slate-700 flex items-center justify-center text-[11px] font-bold text-white group-hover:bg-emerald-600 transition-colors"
        aria-hidden="true"
      >
        {{ userInitials() }}
      </div>
      <div class="hidden sm:flex flex-col items-start leading-tight text-left max-w-[10rem]">
        <span class="text-xs font-bold text-slate-200 truncate w-full">{{ userName() }}</span>
        <span class="text-[9px] text-slate-400 uppercase font-medium tracking-tighter truncate w-full">{{
          userRole()
        }}</span>
      </div>
      <i class="pi pi-chevron-down text-[10px] text-slate-500" aria-hidden="true"></i>
    </button>

    <p-menu
      #menu
      [model]="userConfigItems"
      [popup]="true"
      appendTo="body"
      styleClass="sms-user-menu-popup w-64 shadow-2xl border-slate-200 mt-2 rounded-xl overflow-hidden"
    >
      <ng-template pTemplate="start">
        <div class="p-4 bg-slate-50 border-b border-slate-100 subscriber-id-box">
          <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">Sesión activa</p>
          <p class="text-xs font-mono text-slate-600 truncate">{{ userEmail() || '—' }}</p>
        </div>
      </ng-template>
    </p-menu>
  </div>
</header>
