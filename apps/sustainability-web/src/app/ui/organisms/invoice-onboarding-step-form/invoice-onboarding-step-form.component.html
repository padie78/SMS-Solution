@if (!onboarding.isOCR()) {
  <p-splitter
    [style]="{ height: '560px' }"
    [panelSizes]="[38, 62]"
    styleClass="rounded-xl overflow-hidden border border-slate-200"
  >
    <ng-template pTemplate>
      <div class="flex flex-col h-full min-h-0 bg-slate-950 p-4 md:p-5">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider m-0 mb-2">Visor PDF</p>
        @if (safePdfUrl()) {
          <iframe title="Factura PDF" class="w-full flex-1 min-h-0 rounded-lg border-0 bg-slate-900" [src]="safePdfUrl()!"></iframe>
        } @else {
          <div class="flex flex-col items-center justify-center flex-1 text-slate-500 text-sm p-4 text-center">
            <i class="pi pi-file-pdf text-4xl mb-3 opacity-40" aria-hidden="true"></i>
            Sin archivo PDF en contexto.
          </div>
        }
      </div>
    </ng-template>
    <ng-template pTemplate>
      <form [formGroup]="form" class="flex flex-col gap-3 p-5 md:p-6 h-full overflow-auto" (ngSubmit)="submit()">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider m-0">Datos documentales</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-600 uppercase" for="inv-vendor">Proveedor</label>
            <input pInputText id="inv-vendor" class="w-full" formControlName="vendor" />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-600 uppercase" for="inv-num">Nº factura</label>
            <input pInputText id="inv-num" class="w-full" formControlName="invoiceNumber" />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-600 uppercase" for="inv-start">Periodo inicio</label>
            <input pInputText id="inv-start" class="w-full" formControlName="billingPeriodStart" />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-600 uppercase" for="inv-end">Periodo fin</label>
            <input pInputText id="inv-end" class="w-full" formControlName="billingPeriodEnd" />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-600 uppercase" for="inv-total">Monto total (EUR)</label>
            <input pInputText id="inv-total" type="number" class="w-full" formControlName="total" />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-600 uppercase" for="inv-kwh">Consumo (kWh)</label>
            <input pInputText id="inv-kwh" type="number" class="w-full" formControlName="consumption" />
          </div>
        </div>
        <div class="flex justify-end gap-2 mt-2">
          <p-button
            type="submit"
            label="Continuar"
            icon="pi pi-arrow-right"
            iconPos="right"
            styleClass="p-button-emerald rounded-xl text-xs font-bold px-5"
            [disabled]="form.invalid"
          />
        </div>
      </form>
    </ng-template>
  </p-splitter>
} @else {
  <form [formGroup]="form" class="flex flex-col gap-3 max-w-4xl w-full mx-auto" (ngSubmit)="submit()">
    <p class="text-xs font-bold uppercase tracking-wider text-slate-600 m-0">Validación OCR</p>
    <p class="text-sm text-slate-500 m-0 leading-relaxed">
      Revisa los campos sugeridos por IA antes de asignar medidores.
    </p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2 flex-wrap">
          <label class="text-xs font-bold text-slate-600 uppercase m-0" for="o-vendor">Proveedor</label>
          <p-tag value="Sugerido por IA" severity="info" [rounded]="true" styleClass="text-xs" />
        </div>
        <input pInputText id="o-vendor" class="w-full" formControlName="vendor" />
      </div>
      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2 flex-wrap">
          <label class="text-xs font-bold text-slate-600 uppercase m-0" for="o-num">Nº factura</label>
          <p-tag value="Sugerido por IA" severity="info" [rounded]="true" styleClass="text-xs" />
        </div>
        <input pInputText id="o-num" class="w-full" formControlName="invoiceNumber" />
      </div>
      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2 flex-wrap">
          <label class="text-xs font-bold text-slate-600 uppercase m-0" for="o-start">Periodo inicio</label>
          <p-tag value="Sugerido por IA" severity="info" [rounded]="true" styleClass="text-xs" />
        </div>
        <input pInputText id="o-start" class="w-full" formControlName="billingPeriodStart" />
      </div>
      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2 flex-wrap">
          <label class="text-xs font-bold text-slate-600 uppercase m-0" for="o-end">Periodo fin</label>
          <p-tag value="Sugerido por IA" severity="info" [rounded]="true" styleClass="text-xs" />
        </div>
        <input pInputText id="o-end" class="w-full" formControlName="billingPeriodEnd" />
      </div>
      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2 flex-wrap">
          <label class="text-xs font-bold text-slate-600 uppercase m-0" for="o-total">Monto total (EUR)</label>
          <p-tag value="Sugerido por IA" severity="info" [rounded]="true" styleClass="text-xs" />
        </div>
        <input pInputText id="o-total" type="number" class="w-full" formControlName="total" />
      </div>
      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2 flex-wrap">
          <label class="text-xs font-bold text-slate-600 uppercase m-0" for="o-kwh">Consumo (kWh)</label>
          <p-tag value="Sugerido por IA" severity="info" [rounded]="true" styleClass="text-xs" />
        </div>
        <input pInputText id="o-kwh" type="number" class="w-full" formControlName="consumption" />
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-2">
      <p-button
        type="submit"
        label="Continuar"
        icon="pi pi-arrow-right"
        iconPos="right"
        styleClass="p-button-emerald rounded-xl text-xs font-bold px-5"
        [disabled]="form.invalid"
      />
    </div>
  </form>
}
