<form [formGroup]="uploadForm" (ngSubmit)="processAndContinue()">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 p-8 bg-white rounded-3xl border border-slate-200 shadow-xl">
    
    <div class="flex flex-col gap-6">
      <h3 class="text-lg font-black text-slate-800 border-b pb-3 uppercase tracking-tighter">Asignación de Activos</h3>
      
      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Building Location / Branch</label>
        <p-dropdown [options]="buildings" formControlName="building" placeholder="Seleccionar Ubicación"
          styleClass="w-full" [style]="{'width':'100%'}" appendTo="body"></p-dropdown>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Service</label>
          <p-dropdown [options]="serviceTypes" formControlName="serviceType" placeholder="Tipo"
            styleClass="w-full" [style]="{'width':'100%'}" appendTo="body"></p-dropdown>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cost Center</label>
          <p-dropdown [options]="costCenters" formControlName="costCenter" placeholder="Centro de Costo"
            styleClass="w-full" [style]="{'width':'100%'}" appendTo="body"></p-dropdown>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Meter ID</label>
        <p-dropdown [options]="filteredMeters" formControlName="meterId" placeholder="ID Medidor"
          styleClass="w-full" [style]="{'width':'100%'}" appendTo="body" 
          [disabled]="!uploadForm.get('building')?.value"></p-dropdown>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Internal Notes</label>
        <textarea pInputTextarea formControlName="internalNote" rows="3" class="w-full resize-none" placeholder="Detalles de auditoría..."></textarea>
      </div>
    </div>

    <div class="flex flex-col gap-6 bg-slate-50 p-6 rounded-2xl border border-slate-100">
      <h3 class="text-lg font-black text-slate-800 border-b pb-3 uppercase tracking-tighter">Documento PDF</h3>
      <div class="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-xl p-10 hover:bg-white transition-all">
        <i class="pi pi-cloud-upload text-4xl text-slate-300 mb-4"></i>
        <p-fileUpload mode="basic" (onSelect)="onFileSelect($event)" chooseLabel="Subir Factura" styleClass="p-button-secondary p-button-outlined"></p-fileUpload>
        
        <div *ngIf="selectedFile" class="mt-4 flex items-center gap-2 text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-2 rounded-lg border border-emerald-100">
          <i class="pi pi-file-pdf"></i>
          <span>{{selectedFile.name}}</span>
        </div>
      </div>
      
      <p-button type="submit" label="Analyze with IA" icon="pi pi-sparkles" 
        [disabled]="uploadForm.invalid || !selectedFile"
        styleClass="p-button-emerald w-full h-14 rounded-xl shadow-lg shadow-emerald-500/20">
      </p-button>
    </div>
  </div>
</form>
