<div class="p-8 bg-white rounded-xl shadow-md">
  <h2 class="text-xl font-bold mb-4 text-slate-800">Test de Carga</h2>
  
  <form [formGroup]="uploadForm" class="flex flex-col gap-4">
    <input pInputText formControlName="meterId" placeholder="Meter ID Test" />
    
    <div class="p-4 border-2 border-dashed border-slate-200 text-center">
       <input type="file" (change)="onFileSelect($event)" />
    </div>

    <p-button label="Test Button" (click)="processAndContinue()"></p-button>
  </form>
</div>
