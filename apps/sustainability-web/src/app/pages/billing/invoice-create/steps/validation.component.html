<p-toast></p-toast>

<div class="validation-wrapper flex bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border border-slate-800 h-[750px] relative">
  
  <div *ngIf="isLoading" class="absolute inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center">
    <p-progressSpinner strokeWidth="3" fill="transparent" animationDuration=".5s"></p-progressSpinner>
    <div class="mt-6 text-center">
      <h3 class="text-white font-bold text-xl mb-2">Analizando Documento</h3>
      <p class="text-slate-400 text-sm animate-pulse">Extrayendo datos con IA...</p>
    </div>
  </div>

  <div class="w-1/2 flex flex-col bg-slate-950/50 p-8">
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full" [ngClass]="isLoading ? 'bg-amber-500 animate-pulse' : 'bg-emerald-500'"></div>
        <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Documento Original</span>
      </div>
      <div class="flex gap-4 text-slate-600">
        <a *ngIf="pdfUrl" [href]="pdfUrl" target="_blank" class="hover:text-white transition-colors">
            <i class="pi pi-external-link"></i>
        </a>
      </div>
    </div>

    <div class="invoice-paper flex-1 bg-slate-800 rounded-xl relative shadow-2xl overflow-hidden border border-slate-700">
      
      <object *ngIf="pdfUrl" 
              [data]="pdfUrl" 
              type="application/pdf" 
              class="w-full h-full rounded-xl">
        <div class="flex flex-col items-center justify-center h-full text-slate-400 p-10 text-center">
          <i class="pi pi-file-pdf text-4xl mb-4 text-red-500"></i>
          <p class="text-sm">El visor no pudo cargar. Usa el botón externo para ver el archivo.</p>
        </div>
      </object>

      <div *ngIf="!pdfUrl" class="flex flex-col items-center justify-center h-full space-y-4">
        <i class="pi pi-spin pi-spinner text-slate-600 text-2xl"></i>
        <p class="text-slate-600 text-[10px] font-bold uppercase tracking-widest">Preparando previsualización...</p>
      </div>
    </div>
  </div>

  <div class="w-1/2 flex flex-col p-12 bg-slate-900 border-l border-slate-800 overflow-y-auto">
    <div class="header mb-12">
      <p-tag [value]="isLoading ? 'PROCESSING...' : 'AI AUDIT COMPLETE'" 
             [severity]="isLoading ? 'warning' : 'success'" 
             [rounded]="true" class="mb-4"></p-tag>
      <h2 class="text-white text-2xl font-bold tracking-tight">Confirmar Datos</h2>
      <p class="text-slate-500 text-sm mt-1">Verifica la información extraída por el SMS antes de confirmar.</p>
    </div>

    <div class="form-content flex-1 space-y-10" *ngIf="invoice">
        <div class="field">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-3">Proveedor del Servicio</label>
            <div class="ai-input-group bg-slate-950 p-1.5 rounded-xl border border-slate-800 flex items-center group focus-within:border-emerald-500 transition-all">
              <i class="pi pi-building px-4 text-slate-500 group-focus-within:text-emerald-500"></i>
              <input pInputText [(ngModel)]="invoice.vendor" placeholder="Nombre de la empresa"
                     class="flex-1 bg-transparent border-none text-white font-bold focus:ring-0 outline-none">
            </div>
        </div>

        <div class="field">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-3">Monto Total</label>
            <div class="ai-input-group bg-slate-950 p-1.5 rounded-xl border border-emerald-500/30 flex items-center group focus-within:border-emerald-500 transition-all">
              <span class="px-4 text-emerald-500 font-black text-lg">{{ invoice.currency === 'EUR' ? '€' : '$' }}</span>
              <input pInputText type="number" [(ngModel)]="invoice.total" 
                     class="flex-1 bg-transparent border-none text-emerald-400 font-mono font-bold text-xl focus:ring-0 outline-none">
            </div>
        </div>
        
        </div>

    <div class="footer-actions flex justify-between items-center mt-12 pt-6 border-t border-slate-800">
      <p-button label="Cancelar" icon="pi pi-arrow-left" (click)="goBack()" 
                styleClass="p-button-text p-button-secondary font-bold"></p-button>
      
      <p-button label="Confirmar y Guardar" icon="pi pi-check-circle" 
                [loading]="isLoading" 
                [disabled]="isLoading || !invoice"
                (click)="handleConfirm()" 
                styleClass="p-button-emerald px-10 h-14 rounded-xl shadow-lg shadow-emerald-500/20">
      </p-button>
    </div>
  </div>
</div>
