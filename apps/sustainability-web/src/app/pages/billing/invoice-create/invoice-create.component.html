<div class="invoice-create-container p-6 max-w-7xl mx-auto">
  
  <div class="mb-8">
    <h1 class="text-4xl font-black text-slate-900 tracking-tighter mb-2">Nueva Factura</h1>
    <p class="text-slate-500 text-lg">Gestión de activos y auditoría inteligente</p>
  </div>

  <p-stepper [(activeStep)]="stepper.currentStepIndex">
    
    <p-stepperPanel header="Carga">
      <ng-template pTemplate="content" let-nextCallback="nextCallback">
        <div class="step-viewport mt-4">
          <app-invoice-upload 
            *ngIf="!isLoadingIA"
            (onComplete)="handleStep1Complete(nextCallback)">
          </app-invoice-upload>
        </div>
      </ng-template>
    </p-stepperPanel>

    <p-stepperPanel header="Confirmar">
      <ng-template pTemplate="content" let-prevCallback="prevCallback" let-nextCallback="nextCallback">
        <div class="step-viewport mt-4">
          <app-invoice-validation 
            *ngIf="!isLoadingIA"
            [invoice]="extractedInvoiceData"
            (onBack)="handleBack(prevCallback)"
            (onConfirm)="handleFinalConfirm($event, nextCallback)">
          </app-invoice-validation>
        </div>
      </ng-template>
    </p-stepperPanel>

    <p-stepperPanel header="Sincronizar">
      <ng-template pTemplate="content">
        <div class="success-card flex flex-col items-center justify-center py-20 bg-white rounded-3xl border border-slate-200 shadow-2xl text-center animate-scale-in mt-4">
          <div class="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mb-8 shadow-inner">
            <i class="pi pi-check text-5xl"></i>
          </div>
          <h2 class="text-3xl font-black text-slate-900 mb-4">¡Datos Sincronizados!</h2>
          <p class="text-slate-500 max-w-md text-lg leading-relaxed mb-10">
            La factura ha sido procesada correctamente. El historial de <strong>Energy Intensity</strong> ha sido actualizado.
          </p>
          <button (click)="resetProcess()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all flex items-center gap-3">
            <i class="pi pi-plus"></i> Cargar otra factura
          </button>
        </div>
      </ng-template>
    </p-stepperPanel>

  </p-stepper>

  <div *ngIf="isLoadingIA" class="loading-overlay fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/90 backdrop-blur-sm text-center">
    <div class="spinner-container mb-10">
      <div class="spinner-ring"></div>
      <i class="pi pi-bolt text-emerald-400 text-4xl animate-pulse"></i>
    </div>
    <h2 class="text-2xl font-bold text-white mb-3">Auditando con IA</h2>
    <p class="text-slate-400 font-mono text-xs uppercase tracking-[0.3em]">Procesando Pipeline Sostenible</p>
  </div>

</div>
