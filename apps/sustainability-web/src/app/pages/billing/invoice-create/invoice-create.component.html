<div class="invoice-create-container p-6 max-w-7xl mx-auto">
  
  <div class="stepper-header mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Nueva Factura</h1>
      <p class="text-slate-500">Gestión de activos y auditoría inteligente</p>
    </div>
    
    <div class="flex items-center gap-4">
      <div [class]="'w-10 h-10 rounded-full flex items-center justify-center font-bold ' + (currentStep === 1 ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-200' : 'bg-slate-200 text-slate-500')">1</div>
      <div class="w-12 h-1 bg-slate-200 rounded"></div>
      <div [class]="'w-10 h-10 rounded-full flex items-center justify-center font-bold ' + (currentStep === 2 ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-200' : 'bg-slate-200 text-slate-500')">2</div>
    </div>
  </div>

  <div class="step-content relative">
    
    <app-invoice-upload 
      *ngIf="currentStep === 1 && !isLoadingIA"
      (onComplete)="handleStep1Complete()">
    </app-invoice-upload>

    <app-invoice-validation 
      *ngIf="currentStep === 2 && !isLoadingIA"
      [invoice]="extractedInvoiceData"
      (onBack)="handleBack()"
      (onConfirm)="handleFinalConfirm($event)">
    </app-invoice-validation>

    <div *ngIf="isLoadingIA" class="flex flex-col items-center justify-center py-20 bg-white rounded-3xl border border-slate-200 shadow-sm">
      <div class="relative w-24 h-24 mb-6">
        <div class="absolute inset-0 border-4 border-emerald-100 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-emerald-500 rounded-full border-t-transparent animate-spin"></div>
        <i class="pi pi-sparkles absolute inset-0 flex items-center justify-center text-emerald-500 text-2xl"></i>
      </div>
      <h2 class="text-xl font-bold text-slate-800">Analizando Documento</h2>
      <p class="text-slate-500">Nuestro motor de IA está extrayendo métricas de consumo...</p>
    </div>

  </div>
</div>
