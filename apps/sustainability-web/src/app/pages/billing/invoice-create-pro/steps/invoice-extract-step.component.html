<div class="rounded-xl border border-slate-200 bg-slate-50/80 min-w-0 overflow-hidden">
  <form [formGroup]="form" class="flex flex-col gap-3 p-5 md:p-6 h-full overflow-auto">
    <div class="flex items-start justify-between gap-3 border-b border-slate-200 pb-3">
      <div class="min-w-0">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider m-0">
          {{ 'INVOICE_WIZARD.EXTRACT.HEADLINE' | translate }}
        </p>
        <p class="text-sm text-slate-500 m-0 mt-2 leading-relaxed">
          {{ stateBadge().key | translate }}
        </p>
      </div>
      <p-tag
        [value]="stateBadge().key | translate"
        [severity]="stateBadge().severity"
        [rounded]="true"
        styleClass="text-xs shrink-0"
      />
    </div>

    <div class="invoice-extract__body">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mt-2">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-slate-600 uppercase" for="pro-vendor">
            {{ 'INVOICE_WIZARD.EXTRACT.VENDOR' | translate }}
          </label>
          <input pInputText id="pro-vendor" class="w-full" formControlName="vendor" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-slate-600 uppercase" for="pro-vendor-tax">
            {{ 'INVOICE_WIZARD.EXTRACT.VENDOR_TAX_ID' | translate }}
          </label>
          <input pInputText id="pro-vendor-tax" class="w-full" formControlName="vendorTaxId" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-slate-600 uppercase" for="pro-invoice-number">
            {{ 'INVOICE_WIZARD.EXTRACT.INVOICE_NUMBER' | translate }}
          </label>
          <input pInputText id="pro-invoice-number" class="w-full" formControlName="invoiceNumber" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-slate-600 uppercase" for="pro-invoice-date">
            {{ 'INVOICE_WIZARD.EXTRACT.INVOICE_DATE' | translate }}
          </label>
          <p-calendar
            inputId="pro-invoice-date"
            formControlName="invoiceDate"
            dateFormat="yy-mm-dd"
            appendTo="body"
            styleClass="w-full"
            [showIcon]="true"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-slate-600 uppercase" for="pro-period-start">
            {{ 'INVOICE_WIZARD.EXTRACT.BILLING_START' | translate }}
          </label>
          <p-calendar
            inputId="pro-period-start"
            formControlName="billingPeriodStart"
            dateFormat="yy-mm-dd"
            appendTo="body"
            styleClass="w-full"
            [showIcon]="true"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-slate-600 uppercase" for="pro-period-end">
            {{ 'INVOICE_WIZARD.EXTRACT.BILLING_END' | translate }}
          </label>
          <p-calendar
            inputId="pro-period-end"
            formControlName="billingPeriodEnd"
            dateFormat="yy-mm-dd"
            appendTo="body"
            styleClass="w-full"
            [showIcon]="true"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-slate-600 uppercase" for="pro-total">
            {{ 'INVOICE_WIZARD.EXTRACT.TOTAL_AMOUNT' | translate }}
          </label>
          <p-inputNumber
            inputId="pro-total"
            formControlName="totalAmount"
            mode="decimal"
            [minFractionDigits]="2"
            [maxFractionDigits]="2"
            styleClass="w-full"
          />
        </div>

        <div class="grid grid-cols-[1fr_110px] gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-600 uppercase" for="pro-consumption">
              {{ 'INVOICE_WIZARD.EXTRACT.CONSUMPTION_VALUE' | translate }}
            </label>
            <p-inputNumber
              inputId="pro-consumption"
              formControlName="consumptionValue"
              mode="decimal"
              [minFractionDigits]="2"
              [maxFractionDigits]="3"
              styleClass="w-full"
            />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-600 uppercase" for="pro-unit">
              {{ 'INVOICE_WIZARD.EXTRACT.CONSUMPTION_UNIT' | translate }}
            </label>
            <input pInputText id="pro-unit" class="w-full" formControlName="consumptionUnit" />
          </div>
        </div>
      </div>

      @if (showOverlay()) {
        <div
          class="invoice-extract__overlay"
          [attr.aria-busy]="true"
          role="status"
          aria-live="polite"
        >
          <p-progressSpinner
            styleClass="invoice-extract__spinner"
            strokeWidth="3"
            animationDuration=".75s"
          />
          <p class="m-0 mt-3 text-sm font-bold text-slate-700">
            {{ stateBadge().key | translate }}
          </p>
          <p class="m-0 mt-1 text-xs text-slate-500">
            {{ 'INVOICE_WIZARD.EXTRACT.STATE.AI_HINT' | translate }}
          </p>
        </div>
      }
    </div>
  </form>
</div>
