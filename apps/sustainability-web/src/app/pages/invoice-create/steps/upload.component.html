<div class="upload-step-container flex flex-col items-center justify-center p-12 bg-white border-2 border-dashed border-slate-200 rounded-2xl">
  <div class="icon-circle w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
    <i class="pi pi-cloud-upload text-3xl text-emerald-500"></i>
  </div>
  
  <h2 class="text-xl font-bold text-slate-800 mb-2">Upload Utility Invoice</h2>
  <p class="text-slate-500 text-center max-w-xs mb-8 text-sm">
    Drop your PDF invoice here. Our AI will automatically extract consumption and cost data.
  </p>

  <p-fileUpload 
    mode="basic" 
    name="invoice" 
    chooseLabel="Select PDF File" 
    accept="application/pdf" 
    maxFileSize="10000000" 
    (onSelect)="onUpload($event)"
    styleClass="p-button-emerald">
  </p-fileUpload>
  
  <span class="mt-4 text-[10px] text-slate-400 font-bold uppercase tracking-widest">Supports: PDF, JPG, PNG</span>
</div>
