<form class="flex w-full min-w-0 flex-col gap-5 pt-1 box-border sm:gap-6 md:gap-7" [formGroup]="form" novalidate>
  <input type="hidden" formControlName="id" />
  <input type="hidden" formControlName="organizationId" />
  <input type="hidden" formControlName="regionId" />
  <input type="hidden" formControlName="branchId" />
  <input type="hidden" formControlName="buildingId" />
  <input type="hidden" formControlName="costCenterId" />

  <div class="w-full rounded-2xl border border-slate-200/90 bg-gradient-to-b from-slate-50 to-white p-2 shadow-sm box-border">
    <div role="tablist" aria-label="Secciones activo" class="flex w-full min-w-0 flex-wrap gap-1.5 sm:gap-2">
      @for (tab of tabs; track tab.id) {
        <button
          type="button"
          role="tab"
          class="flex-1 rounded-xl px-3 py-2 text-center text-[11px] font-bold uppercase tracking-wider outline-none ring-emerald-500/0 transition-all duration-150 focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-offset-white sm:flex-none sm:px-4 sm:py-2.5 sm:text-left"
          [attr.aria-selected]="activeTabId() === tab.id"
          [ngClass]="
            activeTabId() === tab.id
              ? 'bg-emerald-600 text-white shadow-md shadow-emerald-900/10 ring-1 ring-emerald-500/30'
              : 'bg-white text-slate-600 ring-1 ring-slate-200/80 hover:bg-emerald-50/90 hover:text-emerald-900 hover:ring-emerald-200/60'
          "
          (click)="selectTab(tab.id)"
        >
          {{ tab.label }}
        </button>
      }
    </div>
  </div>

  @for (tab of tabs; track tab.id) {
    @if (activeTabId() === tab.id) {
      <p-card styleClass="w-full overflow-hidden rounded-2xl border border-slate-200/80 shadow-md [&_.p-card]:w-full [&_.p-card-body]:w-full [&_.p-card-body]:max-w-none box-border">
        <ng-template pTemplate="title">
          <span class="text-base font-bold text-slate-800">{{ tab.headline ?? tab.label }}</span>
        </ng-template>
        <div class="sms-form-grid grid grid-cols-12 gap-x-4 gap-y-5 sm:gap-x-5 sm:gap-y-6">
          @for (field of tab.fields; track field.key) {
            <sms-location-form-field
              [field]="field"
              formIdPrefix="asset-field-"
              [options]="enumOptions(field.enumKey)"
            />
          }
        </div>
      </p-card>
    }
  }

  <p-card styleClass="w-full overflow-hidden rounded-2xl border border-slate-200/80 shadow-md [&_.p-card]:w-full [&_.p-card-body]:w-full [&_.p-card-body]:max-w-none box-border">
    <ng-template pTemplate="title">
      <span class="text-base font-bold text-slate-800">Relación financiera (Cost Center)</span>
    </ng-template>
    <sms-node-cost-center-multi-picker
      [organizationId]="controls.organizationId.value"
      [value]="selectedCostCenterIds()"
      label="Centros de costo asignados"
      helpText="Multi-asignación: el primero queda como costCenterId en AssetDTO; la lista completa se persiste en metadata.costCenterIds."
      inputId="asset-cost-center-picker"
      (valueChange)="onCostCenterIdsChange($event)"
    />
  </p-card>

  <sms-location-form-actions
    [dirty]="form.dirty"
    [invalid]="form.invalid"
    (resetRequested)="reset()"
    (saveRequested)="save()"
    (previewRequested)="togglePreview()"
  />

  @if (preview()) {
    <pre class="w-full overflow-auto rounded-xl border border-slate-800 bg-slate-950 p-3 text-xs text-slate-100">{{ dtoPreview() }}</pre>
  }
</form>
