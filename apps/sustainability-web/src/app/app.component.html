<div class="flex flex-col min-h-screen font-sans">
  
  <header class="bg-white border-b h-16 flex items-center px-6 sticky top-0 z-50 justify-between shadow-sm">
    <div class="flex items-center gap-4">
      <button (click)="sidebarVisible = true" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
        <i class="pi pi-bars text-xl text-slate-700"></i>
      </button>
      <div class="flex items-center gap-2">
        <span class="font-bold text-xl tracking-tight text-emerald-600">SMS</span>
        <span class="text-slate-400 font-light">|</span>
        <span class="text-slate-600 font-medium hidden md:block">Sustainability Management</span>
      </div>
    </div>

    <div class="flex items-center gap-5">
      <button class="relative p-2 text-slate-500 hover:text-emerald-600 transition-colors">
        <i class="pi pi-bell text-lg"></i>
        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
      </button>
      <div class="flex items-center gap-3 pl-4 border-l">
        <div class="text-right hidden sm:block">
          <p class="text-xs font-bold text-slate-700 leading-none">Diego Hernán</p>
          <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Cloud Architect</p>
        </div>
        <div class="w-9 h-9 rounded-full bg-emerald-100 border border-emerald-200 flex items-center justify-center">
          <i class="pi pi-user text-emerald-700"></i>
        </div>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <p-sidebar [(visible)]="sidebarVisible" [baseZIndex]="10000" styleClass="w-72 border-r shadow-xl">
      <div class="flex flex-col h-full py-4">
        <div class="px-4 mb-8">
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Menú Principal</h3>
        </div>
        
        <nav class="flex-1 flex flex-col gap-1 px-2">
          <a routerLink="/dashboard" routerLinkActive="bg-emerald-50 text-emerald-700 font-semibold border-r-4 border-emerald-500" 
             (click)="sidebarVisible = false"
             class="flex items-center gap-3 p-3 text-slate-600 hover:bg-slate-50 rounded-lg transition-all group">
            <i class="pi pi-home group-hover:scale-110 transition-transform"></i>
            <span>Dashboard</span>
          </a>

          <a routerLink="/energy" routerLinkActive="bg-emerald-50 text-emerald-700 font-semibold border-r-4 border-emerald-500"
             (click)="sidebarVisible = false"
             class="flex items-center gap-3 p-3 text-slate-600 hover:bg-slate-50 rounded-lg transition-all group">
            <i class="pi pi-bolt group-hover:scale-110 transition-transform"></i>
            <span>Consumo Energía</span>
          </a>

          <a routerLink="/carbon" routerLinkActive="bg-emerald-50 text-emerald-700 font-semibold border-r-4 border-emerald-500"
             (click)="sidebarVisible = false"
             class="flex items-center gap-3 p-3 text-slate-600 hover:bg-slate-50 rounded-lg transition-all group">
            <i class="pi pi-globe group-hover:scale-110 transition-transform"></i>
            <span>Huella de Carbono</span>
          </a>

          <div class="my-4 mx-3 border-t border-slate-100"></div>

          <a routerLink="/settings" routerLinkActive="bg-slate-100 text-slate-900 font-semibold"
             (click)="sidebarVisible = false"
             class="flex items-center gap-3 p-3 text-slate-500 hover:bg-slate-50 rounded-lg transition-all">
            <i class="pi pi-cog"></i>
            <span>Configuración</span>
          </a>
        </nav>

        <div class="mt-auto px-4 pt-4 border-t border-slate-100">
          <p class="text-[10px] text-slate-400 text-center uppercase tracking-widest">v1.0.0 Stable</p>
        </div>
      </div>
    </p-sidebar>

    <main class="flex-1 overflow-y-auto bg-slate-50 p-4 md:p-8">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <footer class="bg-white border-t py-3 px-6 flex flex-col sm:flex-row justify-between items-center gap-2">
    <p class="text-xs text-slate-500">
      &copy; 2026 SMS - <span class="font-medium">Sustainability Management System</span>
    </p>
    <div class="flex gap-4 text-[10px] text-slate-400 uppercase font-medium">
      <span class="hover:text-emerald-500 cursor-pointer transition-colors">Soporte</span>
      <span class="hover:text-emerald-500 cursor-pointer transition-colors">Privacidad</span>
      <span class="text-emerald-200">|</span>
      <span>D. H. Liascovich</span>
    </div>
  </footer>
</div>
