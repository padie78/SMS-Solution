<p-sidebar [(visible)]="visible" [baseZIndex]="10000" styleClass="w-80 border-r-0 shadow-2xl">
  <div class="flex flex-col h-full bg-slate-900 -m-5">
    
    <div class="p-6 border-b border-slate-800 flex items-center gap-3">
      <div class="bg-emerald-500 p-2 rounded-lg shadow-lg shadow-emerald-900/20">
        <i class="pi pi-shield text-white text-xl"></i>
      </div>
      <div>
        <h2 class="text-white font-bold text-lg leading-none tracking-tight">SMS</h2>
        <p class="text-slate-500 text-[10px] uppercase tracking-widest mt-1 font-bold">Sustainability OS</p>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto py-4 px-3 custom-scrollbar">
      <div *ngFor="let group of menuGroups" class="mb-6">
        <h3 class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.15em] mb-3 px-3">
          {{ group.label }}
        </h3>
        
        <nav class="flex flex-col gap-1">
          <a *ngFor="let item of group.items"
             [routerLink]="item.route"
             routerLinkActive="bg-emerald-600/10 text-emerald-400 border-l-2 border-emerald-500"
             (click)="visible = false"
             class="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-md transition-all group">
            <i [class]="item.icon + ' text-slate-500 group-hover:text-emerald-400 transition-colors'"></i>
            <span class="text-sm font-medium">{{ item.label }}</span>
          </a>
        </nav>
      </div>
    </div>

    <div class="p-4 bg-slate-950/50 border-t border-slate-800">
      <div class="flex items-center gap-3 p-2 rounded-lg bg-slate-900/50 border border-slate-800/50">
        <div class="w-8 h-8 rounded bg-emerald-600 flex items-center justify-center text-xs font-bold text-white">
          DH
        </div>
        <div class="overflow-hidden">
          <p class="text-xs text-slate-200 font-bold truncate">Diego Liascovich</p>
          <p class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">Cloud Architect</p>
        </div>
      </div>
    </div>
  </div>
</p-sidebar>
