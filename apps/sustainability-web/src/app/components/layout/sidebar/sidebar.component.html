<p-sidebar [(visible)]="visible" [baseZIndex]="10000" styleClass="w-80 shadow-2xl border-r-0">
  <div class="flex flex-col h-full bg-slate-900 -m-5"> <div class="p-6 border-b border-slate-800 flex items-center gap-3">
      <div class="bg-emerald-500 p-2 rounded-lg">
        <i class="pi pi-shield text-white text-xl"></i>
      </div>
      <div>
        <h2 class="text-white font-bold text-lg leading-none">SMS</h2>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Sustainability OS</p>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar p-4">
      <div *ngFor="let group of menuGroups" class="mb-6">
        <h3 class="text-slate-500 text-[11px] font-bold uppercase tracking-wider mb-3 px-2">
          {{ group.label }}
        </h3>
        
        <nav class="flex flex-col gap-1">
          <a *ngFor="let item of group.items"
             [routerLink]="item.route"
             routerLinkActive="bg-emerald-600/10 text-emerald-400 border-l-4 border-emerald-500"
             (click)="visible = false"
             class="flex items-center gap-3 p-3 text-slate-300 hover:bg-slate-800 rounded-md transition-all group">
            <i [class]="item.icon + ' text-slate-500 group-hover:text-emerald-400'"></i>
            <span class="text-sm font-medium">{{ item.label }}</span>
          </a>
        </nav>
      </div>
    </div>

    <div class="p-4 bg-slate-950 border-t border-slate-800">
      <div class="flex items-center gap-3 p-2 bg-slate-900 rounded-lg">
        <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center">
          <i class="pi pi-user text-slate-300"></i>
        </div>
        <div class="overflow-hidden">
          <p class="text-xs text-white font-medium truncate">Diego Liascovich</p>
          <p class="text-[10px] text-slate-500 uppercase">Cloud Architect</p>
        </div>
      </div>
    </div>

  </div>
</p-sidebar>
