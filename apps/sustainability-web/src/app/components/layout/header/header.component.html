<header class="bg-white border-b border-slate-200 h-14 flex items-center justify-between px-4 sticky top-0 z-50">
  
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-emerald-600 rounded-md flex items-center justify-center shadow-sm">
      <i class="pi pi-bolt text-white text-sm"></i>
    </div>
    <div class="flex flex-col leading-none">
      <span class="font-bold text-slate-800 tracking-tight">SMS</span>
      <span class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Sustainability OS</span>
    </div>
  </div>

  <div class="flex items-center gap-3">
    
    <div class="hidden md:flex items-center gap-2 px-3 py-1 bg-emerald-50 border border-emerald-100 rounded-full">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      <span class="text-[10px] font-bold text-emerald-700 uppercase tracking-wide">Enterprise Plan</span>
    </div>

    <div class="h-6 w-[1px] bg-slate-200"></div>

    <button #btn (click)="menu.toggle($event)" 
            class="group flex items-center gap-2 p-1 pr-2 hover:bg-slate-50 border border-transparent hover:border-slate-200 rounded-lg transition-all">
      
      <div class="w-7 h-7 rounded bg-slate-800 flex items-center justify-center text-[11px] font-bold text-white group-hover:bg-emerald-600 transition-colors">
        DH
      </div>
      
      <div class="hidden sm:flex flex-col items-start leading-tight">
        <span class="text-xs font-bold text-slate-700 italic">Diego Liascovich</span>
        <span class="text-[9px] text-slate-400 uppercase font-medium">Personal Workspace</span>
      </div>
      
      <i class="pi pi-chevron-down text-[10px] text-slate-400 group-hover:text-slate-600"></i>
    </button>

    <p-menu #menu [model]="userConfigItems" [popup]="true" styleClass="w-64 shadow-2xl border-slate-200 mt-2 rounded-xl overflow-hidden">
      <ng-template pTemplate="start">
        <div class="p-4 bg-slate-50 border-b border-slate-100">
          <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">ID de Suscriptor</p>
          <p class="text-xs font-mono text-slate-600 truncate">usr_829374029312</p>
        </div>
      </ng-template>
    </p-menu>

  </div>
</header>
