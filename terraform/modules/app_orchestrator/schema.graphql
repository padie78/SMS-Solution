schema {
  query: Query
  mutation: Mutation
}

# --- ENTIDADES PRINCIPALES ---

type Organization {
  pk: ID!
  sk: String!
  org_details: OrgDetails
  config: Config
  features: Features
}

type OrgDetails {
  name: String
  sector: String
  country: String
  tax_id: String
}

type Config {
  reporting_currency: String
  fiscal_start_month: Int
  base_year_reference: Int
  area_unit: String
}

type Features {
  ocr_enabled: Boolean
  iot_realtime_enabled: Boolean
  max_branches: Int
  max_assets_per_branch: Int
}

type Branch {
  id: ID!
  name: String!
  city: String!
  sqMeters: Float
  headcount: Int
  totalCo2e: Float
  intensityRatio: Float
  assets: [Asset]
}

type Asset {
  id: ID!
  name: String!
  type: AssetType!
  status: String
  serviceType: String
  totalCo2e: Float
  intensityRatio: Float
  history: [AssetHistoryPoint]
}

enum AssetType {
  VEHICLE
  BUILDING
  MACHINERY
  DATA_CENTER
  OTHER
}

type AssetHistoryPoint {
  date: String
  emissions: Float
  spend: Float
}

# --- ANALÍTICA Y KPIs ---

type YearlyKPI {
  totalCo2e: Float
  totalSpend: Float
  invoiceCount: Int
  lastFile: String
  byService: ServiceBreakdown
}

type ServiceBreakdown {
  ELEC: Float
  GAS: Float
}

type MonthlyKPI {
  month: String
  year: String
  emissions: KPIDetail
  spend: KPIDetail
  isEmissionsUp: Boolean
  isSpendUp: Boolean
}

type KPIDetail {
  value: Float
  previousValue: Float
  diffPercentage: Float
}

type EvolutionData {
  label: String
  emissions: Float
  spend: Float
}

type ForecastReport {
  currentAccumulated: Float
  monthsProcessed: Int
  projectedYearlyTotal: Float
  trend: String
}

type YoYComparison {
  month: Int
  currentYear: YearData
  previousYear: YearData
  diffPercentageEmissions: Float
  diffPercentageSpend: Float
  efficiencyImprovement: Boolean
}

type YearData {
  emissions: Float
  spend: Float
}

type IntensityReport {
  year: String
  ratio: Float
  unit: String
  label: String
}

type ServiceIntensity {
  serviceType: String
  intensityRatio: Float
  totalContributionPercentage: Float
}

type QuarterlyBreakdown {
  Q1: Float
  Q2: Float
  Q3: Float
  Q4: Float
  total: Float
}

# --- OPERACIÓN Y AUDITORÍA ---

type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissions: Float
  consumption: Float
  unit: String
  confidence: Float
  pdfUrl: String
  requiresReview: Boolean
  service: String
}

type Anomaly {
  id: ID!
  date: String
  service: String
  vendor: String
  detectedValue: Float
  expectedValue: Float
  severity: String
  reason: String
}

type AuditItem {
  id: ID!
  vendor: String
  score: Float
  invoiceNumber: String
  reason: String
  pdfUrl: String
}

type DataQualitySummary {
  averageConfidence: Float
  totalPendingReview: Int
  automatedProcessRate: Float
}

type GoalStatus {
  annualTargetEmissions: Float
  currentAccumulated: Float
  remainingCarbonBudget: Float
  daysRemainingInYear: Int
  burnRate: Float
  isOnTrack: Boolean
}

type VendorRanking {
  vendorName: String
  totalCo2e: Float
  totalInvoices: Int
  percentageOfTotalOrgEmissions: Float
  averageConfidence: Float
  lastInvoiceDate: String
}

# --- INPUTS PARA MUTATIONS ---

input CreateBranchInput {
  name: String!
  city: String!
  sqMeters: Float
  headcount: Int
  region: String
}

input UpdateBranchInput {
  name: String
  sqMeters: Float
  headcount: Int
}

input CreateAssetInput {
  name: String!
  type: AssetType!
  serviceType: String!
  meterId: String
  ghgScope: Int
}

input UpdateAssetInput {
  name: String
  status: String
  serviceType: String
  meterId: String
}

input UpdateOrgConfigInput {
  reporting_currency: String
  area_unit: String
  fiscal_start_month: Int
}

# --- QUERIES Y MUTATIONS ---

type Query {
  # Org & Hierarchy
  getOrganization(id: ID!): Organization
  getBranchRanking(year: String!): [Branch]
  getBranchKPI(branchId: ID!, year: String!): YearlyKPI
  getBranchAssets(branchId: ID!): [Asset]
  getAssetDetail(assetId: ID!, year: String!): Asset

  # Analytics
  getYearlyKPI(year: String!): YearlyKPI
  getMonthlyKPI(year: String!, month: String!): MonthlyKPI
  getEvolution(year: String!, serviceType: String): [EvolutionData]
  getForecast(year: String!): ForecastReport
  getQuarterlyBreakdown(year: String!): QuarterlyBreakdown
  getYearOverYear(month: Int!, year: Int!): YoYComparison
  getIntensity(year: String!): IntensityReport
  getIntensityByService(year: String!): [ServiceIntensity]
  
  # Operation & Compliance
  getAnomalies(year: String!, month: String!): [Anomaly]
  getAuditQueue(month: String!, year: String!): [AuditItem]
  dataQualitySummary(month: String!, year: String!): DataQualitySummary
  getVendorRanking(limit: Int): [VendorRanking]
  getGoalTracking(year: String!): GoalStatus
  
  searchInvoices(
    year: String
    month: String
    service: String
    requiresReview: Boolean
  ): [Invoice]
}

type Mutation {
  # Hierarchy CRUD
  createBranch(orgId: ID!, input: CreateBranchInput!): Branch
  updateBranch(orgId: ID!, branchId: ID!, input: UpdateBranchInput!): Branch
  deleteBranch(orgId: ID!, branchId: ID!): Boolean

  createAsset(orgId: ID!, branchId: ID!, input: CreateAssetInput!): Asset
  updateAsset(orgId: ID!, assetId: ID!, input: UpdateAssetInput!): Asset
  deleteAsset(orgId: ID!, assetId: ID!): Boolean
  
  # Settings
  updateOrgConfig(orgId: ID!, input: UpdateOrgConfigInput!): Organization
  
  # Actions
  resolveAnomaly(anomalyId: ID!, resolutionNote: String!): Anomaly
  approveInvoice(invoiceId: ID!): Invoice
}