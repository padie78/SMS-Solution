schema {
  query: Query
  mutation: Mutation
}

# --- 1. RESPUESTAS GENÉRICAS ---f
type MutationResponse {
  success: Boolean!
  message: String
  id: ID
  entity: AWSJSON
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

# --- 2. ENTIDADES DE ANALÍTICA Y FACTURACIÓN ---

type Invoice {
  id: ID!                # Mapeado desde el SK
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  aiThoughtProcess: String
  status: String         # PENDING, APPROVED, REJECTED
  
  # Campos de Auditoría (Críticos para el paso 6 del script)
  approvedBy: String
  approvedAt: String
  lastUpdated: String
}

type YearlyKPI {
  id: ID!
  totalCo2eTon: Float
  totalSpend: Float
  invoiceCount: Int
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  environmental: EnvironmentalImpact
  weather: WeatherAdjustment
  metadata: RecordMetadata
}

type HighFrequencyKPI {
  id: ID!
  totalCo2eKg: Float
  totalSpend: Float
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  performance: AWSJSON
}

type ServiceBreakdown {
  elec_spend: Float
  elec_val: Float
  elec_unit: String
  gas_spend: Float
  gas_val: Float
  gas_unit: String
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
  intensity_per_production_unit: Float 
}

type EnvironmentalImpact {
  avoided_emissions_ton: Float
  renewable_energy_ratio: Float
}

type WeatherAdjustment {
  weather_normalized_usage: Float
}

type RecordMetadata {
  version: String
  is_fiscal_closed: Boolean
}

# --- 3. INPUTS ---

input OrgConfigInput {
  orgId: ID!
  name: String!
  taxId: String!
  hqAddress: String!
  gasConversion: Float
  minConfidence: Float
  currency: String
}

input BranchConfigInput {
  orgId: ID!
  branchId: String!
  name: String!
  location: String
  buildings: [String]
  areas: [String]
  assetId: String      
  climatiqId: String
}

input CostCenterInput {
  orgId: ID!
  id: String
  name: String!
  accountingCode: String!
  monthlyBudget: Float
  managerEmail: String
}

input UtilityTariffInput {
  branchId: String!
  providerName: String!
  serviceType: String!
  unitRate: Float!
  fixedFee: Float
  currency: String
  # --- NUEVOS CAMPOS ---
  calculationType: String    # Ej: "MANUAL" o "AUTO_DERIVED"
  sourceInvoice: String      # ID de la factura que originó el cálculo
}

input ProductionLogInput {
  branchId: ID!
  period: String! 
  unitsProduced: Float!
  unitType: String! 
}

# Nuevo Input para registrar la lectura previa a la aprobación
input InvoiceReadingInput {
  branchId: ID!
  period: String!
  invoiceNumber: String!
  amount: Float!
  consumption: Float!
  currency: String
}

input UserProfileInput {
  orgId: ID!
  userId: ID!
  fullName: String!
  email: String!
  language: String!
  role: String!
}

input CreateAssetInput {
  name: String!
  type: String!
  description: String
  branchId: String
  building: String
  area: String
  costCenterId: String 
  climatiqId: String
  unitType: String
}

input ConfirmInvoiceInput {
  service_type: String!
  total_magnitude_sum: Float!
  billing_period: BillingPeriodInput!
  extracted_data: SimplifiedDataInput!
}

input BillingPeriodInput {
  start: String!
  end: String!
}

input SimplifiedDataInput {
  vendor_name: String
  vendor_tax_id: String
  invoice_number: String
  total_amount: Float
  tax_amount: Float
  base_amount: Float
  currency: String
}

type ActionResponse {
  success: Boolean!
  message: String
  id: String
}

# --- 4. CONSULTAS (QUERIES) ---

type Query {
  getYearlyKPI(year: String!): YearlyKPI
  getQuarterlyKPI(year: String!, quarter: String!): YearlyKPI
  getMonthlyKPI(year: String!, month: String!): YearlyKPI
  getWeeklyKPI(year: String!, week: String!): HighFrequencyKPI
  getDailyKPI(day: String!): HighFrequencyKPI
  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getIntensityReport(year: String!): NormalizationKPIs
  
  # Configuración
  getCostCenters: [AWSJSON]
  getTariffsByBranch(branchId: ID!): [AWSJSON]
}

# --- 5. ACCIONES (MUTATIONS) ---

type Mutation {
  # --- 1. FLUJO DE DATOS (EL CORE) ---
  # Obtiene la URL para subir el PDF a S3.
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse

  # El paso maestro: Al aprobar, el backend calcula CO2, actualiza la tarifa 
  # (Total/Consumo) y registra quién lo hizo mediante el token de Cognito.
  approveInvoice(invoiceId: ID!): Invoice 

  # --- 2. OPERACIÓN (EL CRUCE) ---
  # Registro manual de unidades producidas para calcular el KPI de Intensidad.
  logProduction(input: ProductionLogInput!): MutationResponse

  # --- 3. ESTRUCTURA (SIMPLIFICADA) ---
  # 'Upsert': Crea o actualiza la sucursal y su configuración (Climatiq, presupuestos) en un solo viaje.
  upsertBranch(input: BranchInput!): MutationResponse

  # Gestiona los centros de costos para la asignación de gastos y emisiones.
  saveCostCenter(input: CostCenterInput!): MutationResponse

  # Registro de medidores o maquinaria específica.
  upsertAsset(input: AssetInput!): MutationResponse
  confirmInvoice(sk: String!, input: ConfirmInvoiceInput!): ActionResponse!
}