schema {
  query: Query
  mutation: Mutation
}

# --- 1. RESPUESTAS GENÉRICAS ---
type MutationResponse {
  success: Boolean!
  message: String
  id: ID
  entity: AWSJSON
}

type ActionResponse {
  success: Boolean!
  message: String
  id: String
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

# --- 2. ENTIDADES ---
type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  aiThoughtProcess: String
  status: String
  approvedBy: String
  approvedAt: String
  lastUpdated: String
}

type YearlyKPI {
  id: ID!
  totalCo2eTon: Float
  totalSpend: Float
  invoiceCount: Int
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  environmental: EnvironmentalImpact
  weather: WeatherAdjustment
  metadata: RecordMetadata
}

type HighFrequencyKPI {
  id: ID!
  totalCo2eKg: Float
  totalSpend: Float
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  performance: AWSJSON
}

type ServiceBreakdown {
  elec_spend: Float
  elec_val: Float
  elec_unit: String
  gas_spend: Float
  gas_val: Float
  gas_unit: String
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
  intensity_per_production_unit: Float 
}

type EnvironmentalImpact {
  avoided_emissions_ton: Float
  renewable_energy_ratio: Float
}

type WeatherAdjustment {
  weather_normalized_usage: Float
}

type RecordMetadata {
  version: String
  is_fiscal_closed: Boolean
}

# --- 3. INPUTS (CORREGIDOS PARA MATCH CON MUTATIONS) ---

input OrgConfigInput {
  orgId: ID!
  name: String!
  taxId: String!
  hqAddress: String!
  gasConversion: Float
  minConfidence: Float
  currency: String
}

# Cambiado de BranchConfigInput a BranchInput para que coincida con la Mutation
input BranchInput {
  orgId: ID!
  branchId: String!
  name: String!
  location: String
  buildings: [String]
  areas: [String]
  assetId: String      
  climatiqId: String
}

input CostCenterInput {
  orgId: ID!
  id: String
  name: String!
  accountingCode: String!
  monthlyBudget: Float
  managerEmail: String
}

input UtilityTariffInput {
  branchId: String!
  providerName: String!
  serviceType: String!
  unitRate: Float!
  fixedFee: Float
  currency: String
  calculationType: String
  sourceInvoice: String
}

input ProductionLogInput {
  branchId: ID!
  period: String! 
  unitsProduced: Float!
  unitType: String! 
}

input InvoiceReadingInput {
  branchId: ID!
  period: String!
  invoiceNumber: String!
  amount: Float!
  consumption: Float!
  currency: String
}

input UserProfileInput {
  orgId: ID!
  userId: ID!
  fullName: String!
  email: String!
  language: String!
  role: String!
}

# Cambiado de CreateAssetInput a AssetInput para que coincida con la Mutation
input AssetInput {
  name: String!
  type: String!
  description: String
  branchId: String
  building: String
  area: String
  costCenterId: String 
  climatiqId: String
  unitType: String
}

input ConfirmInvoiceInput {
  service_type: String!
  total_magnitude_sum: Float!
  billing_period: BillingPeriodInput!
  extracted_data: SimplifiedDataInput!
}

input BillingPeriodInput {
  start: String!
  end: String!
}

input SimplifiedDataInput {
  vendor_name: String
  vendor_tax_id: String
  invoice_number: String
  total_amount: Float
  tax_amount: Float
  base_amount: Float
  currency: String
}

# --- 4. CONSULTAS (QUERIES) ---
type Query {
  getYearlyKPI(year: String!): YearlyKPI
  getQuarterlyKPI(year: String!, quarter: String!): YearlyKPI
  getMonthlyKPI(year: String!, month: String!): YearlyKPI
  getWeeklyKPI(year: String!, week: String!): HighFrequencyKPI
  getDailyKPI(day: String!): HighFrequencyKPI
  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getIntensityReport(year: String!): NormalizationKPIs
  getCostCenters: [AWSJSON]
  getTariffsByBranch(branchId: ID!): [AWSJSON]
}

# --- 5. ACCIONES (MUTATIONS) ---
type Mutation {
  # --- 1. CONFIGURACIONES Y PERFILES ---
  saveOrgConfig(input: OrgConfigInput!): MutationResponse
  saveUserProfile(input: UserProfileInput!): MutationResponse
  
  # --- 2. INFRAESTRUCTURA (BRANCHES) ---
  # Terraform busca 'createBranch', 'updateBranch' y 'saveBranchConfig'
  createBranch(input: BranchInput!): MutationResponse
  updateBranch(id: ID!, input: BranchInput!): MutationResponse
  saveBranchConfig(input: BranchConfigInput!): MutationResponse
  upsertBranch(input: BranchInput!): MutationResponse # Mantén este si lo usas en el front

  # --- 3. ACTIVOS (ASSETS) ---
  # Terraform busca 'createAsset' y 'deleteAsset'
  createAsset(input: AssetInput!): MutationResponse
  deleteAsset(id: ID!): MutationResponse
  upsertAsset(input: AssetInput!): MutationResponse

  # --- 4. FINANZAS Y TARIFAS ---
  # Terraform busca 'saveUtilityTariff'
  saveUtilityTariff(input: UtilityTariffInput!): MutationResponse
  saveCostCenter(input: CostCenterInput!): MutationResponse

  # --- 5. OPERACIONES Y FACTURACIÓN ---
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  approveInvoice(invoiceId: ID!): Invoice 
  logProduction(input: ProductionLogInput!): MutationResponse
  confirmInvoice(sk: String!, input: ConfirmInvoiceInput!): ActionResponse!
}