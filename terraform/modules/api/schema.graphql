schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# --- ENUMS ---
enum NodeType { ORGANIZATION; REGION; BRANCH; BUILDING; ASSET; METER; COST_CENTER }
enum InvoiceStatus { UPLOADED; PROCESSING; READY_FOR_REVIEW; FAILED; CONFIRMED; POSTED }

# --- TIPOS DE RESPUESTA (Autorización Unificada) ---
type MutationResponse @aws_api_key @aws_cognito_user_pools {
  success: Boolean!
  message: String
  id: ID
  path: String
  entity: AWSJSON
}

type Node @aws_api_key @aws_cognito_user_pools {
  id: ID!
  parentId: ID
  path: String!
  nodeType: NodeType!
  name: String!
  metadata: AWSJSON
}

type Invoice @aws_api_key @aws_cognito_user_pools {
  id: ID!
  status: InvoiceStatus
  vendor: String
  totalAmount: Float
}

# --- INPUTS ---
input SaveNodeInput { id: ID; parentId: ID!; nodeType: NodeType!; name: String!; metadata: AWSJSON }
input UpdateNodeInput { name: String; metadata: AWSJSON }

# --- CONSULTAS ---
type Query {
  getTree(rootNodeId: ID): [Node] @aws_cognito_user_pools
  getNode(id: ID!): Node @aws_cognito_user_pools
  getInvoice(id: ID!): Invoice @aws_cognito_user_pools
}

# --- ACCIONES ---
type Mutation {
  # Todas las mutaciones de nodo devuelven MutationResponse
  saveNode(input: SaveNodeInput!): MutationResponse @aws_cognito_user_pools
  updateNode(id: ID!, input: UpdateNodeInput!): MutationResponse @aws_cognito_user_pools
  deleteNode(id: ID!): MutationResponse @aws_cognito_user_pools
  
  updateInvoiceStatus(id: ID!, status: InvoiceStatus!): Invoice 
    @aws_api_key @aws_cognito_user_pools
}

# --- SUSCRIPCIONES (Sin argumentos para evitar errores de validación) ---
type Subscription {
  onInvoiceUpdated: Invoice
    @aws_subscribe(mutations: ["updateInvoiceStatus"])
    @aws_api_key @aws_cognito_user_pools
    
  onNodeChanged: MutationResponse
    @aws_subscribe(mutations: ["saveNode", "updateNode", "deleteNode"])
    @aws_api_key @aws_cognito_user_pools
}