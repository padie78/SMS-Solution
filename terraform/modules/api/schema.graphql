schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# --- ENUMS ---
enum NodeType { ORGANIZATION; REGION; BRANCH; BUILDING; ASSET; METER; COST_CENTER }
enum InvoiceStatus { UPLOADED; PROCESSING; READY_FOR_REVIEW; FAILED; CONFIRMED; POSTED }

# --- TIPOS DE RESPUESTA (Autorización Unificada) ---
type MutationResponse @aws_api_key @aws_cognito_user_pools {
  success: Boolean!
  message: String
  id: ID
  path: String
  entity: AWSJSON
}

type Node @aws_api_key @aws_cognito_user_pools {
  id: ID!
  parentId: ID
  path: String!
  nodeType: NodeType!
  name: String!
  metadata: AWSJSON
}

type Invoice @aws_api_key @aws_cognito_user_pools {
  id: ID!
  status: InvoiceStatus
  vendor: String
  totalAmount: Float
}

# --- INPUTS (sin tenantId: el aislamiento multi-tenant viene de Cognito) ---
# Claims: custom:tenant_id; opcional custom:organization_id.
# orgId en input fuerza el segmento ORG# de la PK al ID real de organización (p. ej. CB7647AC).
input SaveNodeInput {
  id: ID
  orgId: ID
  parentId: ID!
  nodeType: NodeType!
  name: String!
  metadata: AWSJSON
}

input UpdateNodeInput {
  name: String
  metadata: AWSJSON
}

# --- CONSULTAS ---
type Query {
  getTree(rootNodeId: ID, orgId: ID): [Node] @aws_cognito_user_pools
  getNode(id: ID!, orgId: ID): Node @aws_cognito_user_pools
  getInvoice(id: ID!): Invoice @aws_cognito_user_pools
}

# --- ACCIONES ---
type Mutation {
  saveNode(input: SaveNodeInput!): MutationResponse @aws_cognito_user_pools
  updateNode(id: ID!, orgId: ID, input: UpdateNodeInput!): MutationResponse @aws_cognito_user_pools
  deleteNode(id: ID!, orgId: ID): MutationResponse @aws_cognito_user_pools
  
  updateInvoiceStatus(id: ID!, status: InvoiceStatus!): Invoice 
    @aws_api_key @aws_cognito_user_pools
}

# --- SUSCRIPCIONES (Sin argumentos para evitar errores de validación) ---
type Subscription {
  onInvoiceUpdated: Invoice
    @aws_subscribe(mutations: ["updateInvoiceStatus"])
    @aws_api_key @aws_cognito_user_pools
    
  onNodeChanged: MutationResponse
    @aws_subscribe(mutations: ["saveNode", "updateNode", "deleteNode"])
    @aws_api_key @aws_cognito_user_pools
}
