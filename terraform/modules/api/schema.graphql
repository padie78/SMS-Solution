schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# --- 0. ENUMS ---

enum InvoiceStatus {
  UPLOADED
  PROCESSING
  READY_FOR_REVIEW
  FAILED
  CONFIRMED
  POSTED
}
# --- 1. RESPUESTAS Y CONTROL ---

type MutationResponse {
  success: Boolean!
  message: String
  orgId: ID
  branchId: ID
  buildingId: ID
  ccId: ID
  assetId: ID
  meterId: ID
  tariffId: ID
  logKey: ID
  factorKey: ID
  service: String
  entity: AWSJSON
}

type ActionResponse {
  success: Boolean!
  message: String
  id: String
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

type InvoiceIAProcessingResponse {
  success: Boolean!
  message: String
  vendor: String
  date: String
  total: Float
  consumption: Float
  co2e: Float
  currency: String
  category: String
  confidence: Float
}

# --- 2. NÚCLEO ANALÍTICO ---

type AnalyticsResponse {
  id: ID!
  metadata: AnalyticsMetadata
  financials_total_spend: Float
  ghg_total_co2e_ton: Float
  ghg_total_co2e_kg: Float
  cost_per_m2: Float
  trazabilidad_total_invoices: Int
  last_updated: String
  budget_deviation_pct: Float
  target_deviation_pct: Float
  energy_intensity_per_m2: Float
  consumption_gas_val: Float
  consumption_elec_val: Float
  energy_intensity_index: Float
  phantom_load_kwh: Float
  advanced_analytics: AdvancedAnalytics
  predictive_engine: PredictiveEngine
  management_reporting: ManagementReporting
  regulatory_compliance: RegulatoryCompliance
  sourceData: AWSJSON 
}

type AnalyticsMetadata {
  orgId: ID
  year: String
  quarter: String
  month: String
  week: String
  day: String
  granularity: String
  lastUpdated: String
}

type AdvancedAnalytics {
  data_quality_score: String
  emission_factor_source: String
  energy_intensity_index: Float
  renewable_energy_mix_pct: Float
  transition_risk_scoring: AWSJSON
  energy_source_mix: AWSJSON
  data_reliability_pct: Float
}

type PredictiveEngine {
  current_vs_target_pct: Float
  financial_risk_exposure: Float
  forecast_year_end_co2: Float
  target_annual_limit: Float
  projected_gap_vs_target: Float
}

type ManagementReporting {
  carbon_intensity_revenue: Float
  reporting_period_status: String
}

type RegulatoryCompliance {
  methodology: String
  reporting_standard: String
  scope_category: String
}

# --- 3. ENTIDADES ---

type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  status: InvoiceStatus
  storageKey: String
  extractedData: AWSJSON
  aiThoughtProcess: String
  lastUpdated: String
  buildingId: ID
  meterId: ID
  costCenterId: ID
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
  intensity_per_production_unit: Float 
}

# --- 4. INPUTS ---

input CreateInvoiceInput {
  storageKey: String!
  serviceType: String!
  buildingId: ID
  meterId: ID
  costCenterId: ID
  internalNote: String
  status: InvoiceStatus
}

input OrgConfigInput {
  name: String
  taxId: String
  hqAddress: String
  totalGlobalM2: Float
  industrySector: String
  currency: String
  reportingCurrency: String
  minConfidence: Float
  baselineYear: Int
  reductionTarget: Float
  targetYear: Int
  subscriptionPlan: String
}

input BranchInput {
  branchId: String!
  name: String!
  m2Surface: Float
  facilityType: String
  timezone: String
  geoLocation: String
  energyTarget: Float
  carbonBudget: Float
  region: String
  criticality: String
}

input BuildingInput {
  name: String!
  usageType: String
  status: String
  yearBuilt: Int
  m2Surface: Float
  m3Volume: Float
  hvacType: String
  lightingTech: String
  hasBms: Boolean
  zoneId: String
}

input AssetInput {
  name: String
  category: String
  status: String
  criticality: String
  nominalPower: Float
  meterId: String
  branchId: String
  buildingId: String
  costCenterId: String
}

input TariffInput {
  providerName: String
  contractId: String
  accountNumber: String
  pricingModel: String
  baseRate: Float
  peakRate: Float
  offPeakRate: Float
  taxes: [TaxInput]
  validFrom: String
  validTo: String
}

input TaxInput {
  name: String
  rate: Float
}

input ProductionLogInput {
  units: Float
  unitType: String
  shiftMode: String
  efficiency: Float
  waste: Float
  activeLines: Int
}

input MeterInput {
  name: String
  serialNumber: String
  iotName: String
  protocol: String
  type: String
  isMain: Boolean
  parentMeterId: String
  buildingId: String
}

input BillingPeriodInput {
  start: String!
  end: String!
}

input SimplifiedDataInput {
  vendor_name: String
  vendor_tax_id: String
  invoice_number: String
  total_amount: Float
  tax_amount: Float
  base_amount: Float
  currency: String
}

input ConfirmInvoiceInput {
  service_type: String!
  total_magnitude_sum: Float!
  billing_period: BillingPeriodInput!
  extracted_data: SimplifiedDataInput!
}

input CostCenterInput {
  id: ID!
  name: String!
  accountingCode: String
  managerId: String
  branchId: ID!
  method: String 
  percentage: Float
  operatingHours: Int
  annualBudget: Float
  glMapping: String
}

input AlertRuleInput {
  name: String!
  description: String
  status: String 
  priority: String 
  metricSource: String
  operator: String 
  threshold: Float!
  durationMins: Int
  channels: [String]
  recipients: [String]
}

input UserInput {
  fullName: String!
  email: String!
  position: String
  role: String! 
  language: String
  emailAlerts: Boolean
}

input EmissionFactorInput {
  name: String!
  year: Int!
  regionCode: String!
  activityType: String! 
  unit: String! 
  value: Float!
  scope: String 
  methodology: String
}

# --- 5. CONSULTAS (QUERIES) ---

type Query {
  getInvoice(id: ID!): Invoice

  getPrecalculatedKPI(
    year: String!, 
    quarter: String, 
    month: String, 
    week: String,
    day: String
  ): AnalyticsResponse

  getConsumptionAnalytics(
    entityId: ID!, 
    type: String!, 
    startDate: String!, 
    endDate: String!
  ): AnalyticsResponse

  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getCostCenters: [AWSJSON]
  getTariffsByBranch(branchId: ID!): [AWSJSON]
  getIntensityReport(year: String!): NormalizationKPIs
}

# --- 6. ACCIONES (MUTATIONS) ---

type Mutation {
  # --- Registro y Pipeline Asíncrono (SQS) ---
  createInvoice(input: CreateInvoiceInput!): Invoice
  
  updateInvoiceStatus(
    id: ID!, 
    status: InvoiceStatus!, 
    extractedData: AWSJSON,
    message: String
  ): Invoice

  # --- Configuración y Core ---
  saveOrgConfig(orgId: ID!, input: OrgConfigInput!): MutationResponse
  createBranch(orgId: ID!, input: BranchInput!): MutationResponse
  saveBuilding(orgId: ID!, branchId: ID!, buildingId: ID!, input: BuildingInput!): MutationResponse
  saveAsset(orgId: ID!, assetId: ID!, input: AssetInput!): MutationResponse
  saveMeter(orgId: ID!, branchId: ID!, meterId: ID!, input: MeterInput!): MutationResponse
  saveTariff(orgId: ID!, branchId: ID!, serviceType: String!, input: TariffInput!): MutationResponse
  saveProductionLog(orgId: ID!, branchId: ID!, period: String!, input: ProductionLogInput!): MutationResponse
  saveCostCenter(orgId: ID!, input: CostCenterInput!): MutationResponse
  saveAlertRule(orgId: ID!, branchId: ID!, entityId: ID!, alertType: String!, input: AlertRuleInput!): MutationResponse
  saveUser(orgId: ID!, userId: ID!, input: UserInput!): MutationResponse
  saveEmissionFactor(input: EmissionFactorInput!): MutationResponse
  
  # --- Pipeline de Facturación e IA ---
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  processInvoice(fileName: String!, folderId: String): InvoiceIAProcessingResponse
  validateInvoice(orgId: ID!, storageKey: String!, input: ConfirmInvoiceInput!): ActionResponse!
  confirmInvoice(sk: String!, input: ConfirmInvoiceInput!): ActionResponse!
  approveInvoice(invoiceId: ID!): Invoice 
}

# --- 7. TIEMPO REAL (SUBSCRIPTIONS) ---

type Subscription {
  onInvoiceUpdated(id: ID!): Invoice
    @aws_subscribe(mutations: ["updateInvoiceStatus"])
}