schema {
  query: Query
  mutation: Mutation
}

# --- 1. RESPUESTAS Y CONTROL ---
type MutationResponse {
  success: Boolean!
  message: String
  orgId: ID
  branchId: ID
  buildingId: ID
  ccId: ID          # <--- Agregado
  assetId: ID
  meterId: ID
  tariffId: ID      # <--- Agregado
  logKey: ID        # <--- Agregado (para production logs)
  factorKey: ID
  service: String
  entity: AWSJSON
}

type ActionResponse {
  success: Boolean!
  message: String
  id: String
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

# --- 2. NÚCLEO ANALÍTICO (Unified Analytics) ---
# Unifica Yearly, Quarterly, Monthly, Weekly y Daily en una sola estructura

type AnalyticsResponse {
  id: ID!
  metadata: AnalyticsMetadata
  # Mantenemos los tipos fijos para que el dashboard tenga una base estable
  financials: FinancialsAnalytics
  energy: EnergyAnalytics
  sustainability: SustainabilityAnalytics
  operational: OperationalAnalytics
  breakdowns: AnalyticsBreakdowns
  sourceData: AWSJSON 
}

type AnalyticsMetadata {
  orgId: ID
  year: String
  quarter: String
  month: String
  week: String
  day: String
  granularity: String
  lastUpdated: String
}

type FinancialsAnalytics {
  totalSpend: Float
  currency: String
  costPerM2: Float               # Pregunta #15
  savingsRealized: Float         # Pregunta #17
  savingsPending: Float          # Pregunta #18 (Costo Procrastinación)
  avoidedCost: Float             # Ahorro proyectado vs real
  taxRiskExposure: AWSJSON       # Pregunta #21
}

type EnergyAnalytics {
  consumptionKwh: Float
  intensityIndex: Float          # Pregunta #3 y #11
  phantomLoadKwh: Float          # Pregunta #14 (Consumos Fantasmas)
  idleEnergyCost: Float          # Pregunta #22 (No aprovechada)
  gridEfficiency: Float          # Pregunta #12
  baseloadKwh: Float             # Consumo base constante
}

type SustainabilityAnalytics {
  totalCo2eKg: Float
  carbonIntensity: Float         # Emisiones / Producción
  renewableRatio: Float          # % de energía limpia
  netZeroGapPct: Float           # Pregunta #19
  complianceStatus: String       # Pregunta #8
  weatherNormalizedUsage: Float  # Pregunta #23
}

type OperationalAnalytics {
  dataQualityScore: Float        # Pregunta #9
  reliabilityPct: Float          # Pregunta #24 (Cadena Custodia)
  gridHealthIncidents: Int       # Pregunta #7 y #16
  activeVsIdleRatio: Float       # Pregunta #5
  nominalLoadPerformance: Float  # Pregunta #13
}

type AnalyticsBreakdowns {
  byService: ServiceBreakdown    # Pregunta #10 (HVAC, Lighting, etc)
  bySource: AWSJSON              # (Grid, Solar, GenSet)
}

type ServiceBreakdown {
  elec_spend: Float
  elec_val: Float
  gas_spend: Float
  gas_val: Float
  hvac_val: Float
  lighting_val: Float
  other_val: Float
}

# --- 3. ENTIDADES ---
type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  status: String
  aiThoughtProcess: String
  lastUpdated: String
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
  intensity_per_production_unit: Float 
}

# --- 4. INPUTS ---

input OrgConfigInput {
  name: String
  taxId: String
  hqAddress: String
  totalGlobalM2: Float
  industrySector: String
  currency: String
  reportingCurrency: String
  minConfidence: Float
  baselineYear: Int
  reductionTarget: Float
  targetYear: Int
  subscriptionPlan: String
}

input BranchInput {
  branchId: String!
  name: String!
  m2Surface: Float
  facilityType: String
  timezone: String
  geoLocation: String
  energyTarget: Float
  carbonBudget: Float
  region: String
  criticality: String
}

input BuildingInput {
  name: String!
  usageType: String
  status: String
  yearBuilt: Int
  m2Surface: Float
  m3Volume: Float
  hvacType: String
  lightingTech: String
  hasBms: Boolean
  zoneId: String
}

input AssetInput {
  name: String
  category: String
  status: String
  criticality: String
  nominalPower: Float
  meterId: String
  branchId: String
  buildingId: String
  costCenterId: String
}

input TariffInput {
  providerName: String
  contractId: String
  accountNumber: String
  pricingModel: String
  baseRate: Float
  peakRate: Float
  offPeakRate: Float
  taxes: [TaxInput]
  validFrom: String
  validTo: String
}

input TaxInput {
  name: String
  rate: Float
}

input ProductionLogInput {
  units: Float
  unitType: String
  shiftMode: String
  efficiency: Float
  waste: Float
  activeLines: Int
}

input MeterInput {
  name: String
  serialNumber: String
  iotName: String
  protocol: String
  type: String
  isMain: Boolean
  parentMeterId: String
  buildingId: String
}

input ConfirmInvoiceInput {
  service_type: String!
  total_magnitude_sum: Float!
  billing_period: BillingPeriodInput!
  extracted_data: SimplifiedDataInput!
}

input BillingPeriodInput {
  start: String!
  end: String!
}

input SimplifiedDataInput {
  vendor_name: String
  vendor_tax_id: String
  invoice_number: String
  total_amount: Float
  tax_amount: Float     # <--- Agregar este
  base_amount: Float    # <--- Agregar este
  currency: String
}

# --- 1. Para saveCostCenter ---
input CostCenterInput {
  id: ID!
  name: String!
  accountingCode: String
  managerId: String
  branchId: ID!
  method: String # Ej: SQUARE_METERS, PERCENTAGE
  percentage: Float
  operatingHours: Int
  annualBudget: Float
  glMapping: String
}

# --- 2. Para saveAlertRule ---
input AlertRuleInput {
  name: String!
  description: String
  status: String # ENABLED, DISABLED
  priority: String # P1, P2, P3
  metricSource: String
  operator: String # GREATER_THAN, LESS_THAN
  threshold: Float!
  durationMins: Int
  channels: [String]
  recipients: [String]
}

# --- 3. Para saveUser ---
input UserInput {
  fullName: String!
  email: String!
  position: String
  role: String! # ADMIN, MANAGER, VIEWER
  language: String
  emailAlerts: Boolean
}

# --- 4. Para saveEmissionFactor ---
input EmissionFactorInput {
  name: String!
  year: Int!
  regionCode: String!
  activityType: String! # ELEC, GAS, etc
  unit: String! # kg/kWh
  value: Float!
  scope: String # SCOPE_1, SCOPE_2, SCOPE_3
  methodology: String
}

# --- 5. CONSULTAS (QUERIES) ---
type Query {
  # El punto de entrada unificado para todos los periodos pre-calculados
  getPrecalculatedKPI(
    year: String!, 
    quarter: String, 
    month: String, 
    week: String,   # <--- Agregado
    day: String
  ): AnalyticsResponse

  # Query dinámico para GSI1 (Análisis por Branch o Asset)
  getConsumptionAnalytics(
    entityId: ID!, 
    type: String!, 
    startDate: String!, 
    endDate: String!
  ): AnalyticsResponse

  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getCostCenters: [AWSJSON]
  getTariffsByBranch(branchId: ID!): [AWSJSON]
  getIntensityReport(year: String!): NormalizationKPIs
}

# --- 6. ACCIONES (MUTATIONS) ---
type Mutation {
  saveOrgConfig(orgId: ID!, input: OrgConfigInput!): MutationResponse
  createBranch(orgId: ID!, input: BranchInput!): MutationResponse
  saveBuilding(orgId: ID!, branchId: ID!, buildingId: ID!, input: BuildingInput!): MutationResponse
  saveAsset(orgId: ID!, assetId: ID!, input: AssetInput!): MutationResponse
  saveMeter(orgId: ID!, branchId: ID!, meterId: ID!, input: MeterInput!): MutationResponse
  saveTariff(orgId: ID!, branchId: ID!, serviceType: String!, input: TariffInput!): MutationResponse
  saveProductionLog(orgId: ID!, branchId: ID!, period: String!, input: ProductionLogInput!): MutationResponse
  saveCostCenter(orgId: ID!, input: CostCenterInput!): MutationResponse
  saveAlertRule(orgId: ID!, branchId: ID!, entityId: ID!, alertType: String!, input: AlertRuleInput!): MutationResponse
  saveUser(orgId: ID!, userId: ID!, input: UserInput!): MutationResponse
  saveEmissionFactor(input: EmissionFactorInput!): MutationResponse
  
  # Procesamiento de Facturas
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  confirmInvoice(sk: String!, input: ConfirmInvoiceInput!): ActionResponse!
  approveInvoice(invoiceId: ID!): Invoice 
}