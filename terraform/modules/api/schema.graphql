schema {
  query: Query
  mutation: Mutation
}

# --- 1. RESPUESTAS GENÉRICAS ---
type MutationResponse {
  success: Boolean!
  message: String
  id: ID
  entity: AWSJSON
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

# --- 2. ENTIDADES DE ANALÍTICA ---

type YearlyKPI {
  id: ID!
  totalCo2eTon: Float
  totalSpend: Float
  invoiceCount: Int
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  environmental: EnvironmentalImpact
  weather: WeatherAdjustment
  metadata: RecordMetadata
}

type HighFrequencyKPI {
  id: ID!
  totalCo2eKg: Float
  totalSpend: Float
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  performance: AWSJSON
}

type ServiceBreakdown {
  elec_spend: Float
  elec_val: Float
  elec_unit: String
  gas_spend: Float
  gas_val: Float
  gas_unit: String
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
  intensity_per_production_unit: Float # Nuevo: KPI de Intensidad (kWh/Unidad)
}

type EnvironmentalImpact {
  avoided_emissions_ton: Float
  renewable_energy_ratio: Float
}

type WeatherAdjustment {
  weather_normalized_usage: Float
}

type RecordMetadata {
  version: String
  is_fiscal_closed: Boolean
}

type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  aiThoughtProcess: String
  status: String # Nuevo: PENDING_REVIEW, APPROVED, REJECTED
}

# --- 3. INPUTS DE CONFIGURACIÓN ---

input OrgConfigInput {
  orgId: ID!
  name: String!
  taxId: String!
  hqAddress: String!
  gasConversion: Float
  minConfidence: Float
  currency: String
}

input BranchConfigInput {
  orgId: ID!
  branchId: String!
  name: String!
  location: String
  buildings: [String]
  areas: [String]
  assetId: String      
  climatiqId: String
}

# --- NUEVOS INPUTS ---

input CostCenterInput {
  orgId: ID!
  id: String
  name: String!
  accountingCode: String!
  monthlyBudget: Float
  managerEmail: String
}

input UtilityTariffInput {
  branchId: ID!
  providerName: String!
  serviceType: String! # ELECTRICITY, GAS, WATER
  contractedPower: Float
  unitRate: Float!
  fixedFee: Float
  currency: String
}

input ProductionLogInput {
  branchId: ID!
  period: String! # Ej: "2026-03"
  unitsProduced: Float!
  unitType: String! # TONS, UNITS, LITERS
}

input UserProfileInput {
  orgId: ID!
  userId: ID!
  fullName: String!
  email: String!
  language: String!
  role: String!
}

input CreateAssetInput {
  name: String!
  type: String!
  description: String
  branchId: String
  building: String
  area: String
  costCenterId: String # Nuevo: Vinculación financiera
  climatiqId: String
  unitType: String
}

# --- 4. CONSULTAS (QUERIES) ---

type Query {
  getYearlyKPI(year: String!): YearlyKPI
  getQuarterlyKPI(year: String!, quarter: String!): YearlyKPI
  getMonthlyKPI(year: String!, month: String!): YearlyKPI
  getWeeklyKPI(year: String!, week: String!): HighFrequencyKPI
  getDailyKPI(day: String!): HighFrequencyKPI
  getYearOverYear(year: String!, month: String!): AWSJSON
  getGoalTracking(year: String!): AWSJSON
  getIntensityReport(year: String!): NormalizationKPIs
  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getVendorRanking(year: String!, limit: Int): AWSJSON
  
  # Nuevas Queries de Configuración
  getCostCenters: [AWSJSON]
  getTariffsByBranch(branchId: ID!): [AWSJSON]
}

# --- 5. ACCIONES (MUTATIONS) ---

type Mutation {
  # Archivos e Invoices
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  approveInvoice(invoiceId: ID!): Invoice

  # Activos
  createAsset(input: CreateAssetInput!): MutationResponse
  deleteAsset(id: ID!): MutationResponse

  # Infraestructura y Configuración
  createBranch(name: String!, location: String): MutationResponse
  updateBranch(id: ID!, name: String, location: String): MutationResponse
  
  # --- NUEVAS MUTACIONES ---
  saveCostCenter(input: CostCenterInput!): MutationResponse
  saveUtilityTariff(input: UtilityTariffInput!): MutationResponse
  logProduction(input: ProductionLogInput!): MutationResponse
  
  # Configuraciones base
  saveOrgConfig(input: OrgConfigInput!): MutationResponse
  saveBranchConfig(input: BranchConfigInput!): MutationResponse
  saveUserProfile(input: UserProfileInput!): MutationResponse
}