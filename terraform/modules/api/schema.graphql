schema {
  query: Query
  mutation: Mutation
}

# --- 1. RESPUESTAS Y CONTROL ---
type MutationResponse {
  success: Boolean!
  message: String
  orgId: ID
  branchId: ID
  buildingId: ID
  ccId: ID
  assetId: ID
  meterId: ID
  tariffId: ID
  logKey: ID
  factorKey: ID
  service: String
  entity: AWSJSON
}

type ActionResponse {
  success: Boolean!
  message: String
  id: String
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

# --- 2. NÚCLEO ANALÍTICO (Unified Analytics) ---

type AnalyticsResponse {
  id: ID!
  metadata: AnalyticsMetadata
  # CRITICAL: Cambiado de AWSJSON a Tipos Estructurados para permitir sub-selección
  financials: FinancialsAnalytics
  energy: EnergyAnalytics
  sustainability: SustainabilityAnalytics
  operational: OperationalAnalytics
  predictive: PredictiveAnalytics
  compliance: ComplianceAnalytics
  sourceData: AWSJSON 
}

type AnalyticsMetadata {
  orgId: ID
  year: String
  quarter: String
  month: String
  week: String
  day: String
  granularity: String
  lastUpdated: String
}

type FinancialsAnalytics {
  totalSpend: Float
  currency: String
  costPerM2: Float
  savingsRealized: Float
  savingsPending: Float
  avoidedCost: Float
  taxRiskExposure: AWSJSON
}

type EnergyAnalytics {
  consumptionKwh: Float
  intensityIndex: Float
  phantomLoadKwh: Float
  idleEnergyCost: Float
  gridEfficiency: Float
  baseloadKwh: Float
}

type SustainabilityAnalytics {
  totalCo2eKg: Float
  carbonIntensity: Float
  renewableRatio: Float
  netZeroGapPct: Float
  complianceStatus: String
  weatherNormalizedUsage: Float
}

type OperationalAnalytics {
  dataQualityScore: Float
  reliabilityPct: Float
  gridHealthIncidents: Int
  activeVsIdleRatio: Float
  nominalLoadPerformance: Float
}

type PredictiveAnalytics {
  financial_risk_exposure: Float
  target_annual_limit_ton: Float
  forecast_year_end_co2_ton: Float
  projected_gap_vs_target: Float
}

type ComplianceAnalytics {
  methodology: String
  standard: String
}

# --- 3. ENTIDADES Y DEMÁS ESTRUCTURAS ---
# (Se mantienen igual a tu definición original para Invoice, Inputs, etc.)

type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  status: String
  aiThoughtProcess: String
  lastUpdated: String
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
  intensity_per_production_unit: Float 
}

# --- 5. CONSULTAS (QUERIES) ---
type Query {
  getPrecalculatedKPI(
    year: String!, 
    quarter: String, 
    month: String, 
    week: String,
    day: String
  ): AnalyticsResponse

  getConsumptionAnalytics(
    entityId: ID!, 
    type: String!, 
    startDate: String!, 
    endDate: String!
  ): AnalyticsResponse

  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getCostCenters: [AWSJSON]
  getTariffsByBranch(branchId: ID!): [AWSJSON]
  getIntensityReport(year: String!): NormalizationKPIs
}

# --- 6. ACCIONES (MUTATIONS) ---
type Mutation {
  saveOrgConfig(orgId: ID!, input: OrgConfigInput!): MutationResponse
  createBranch(orgId: ID!, input: BranchInput!): MutationResponse
  saveBuilding(orgId: ID!, branchId: ID!, buildingId: ID!, input: BuildingInput!): MutationResponse
  saveAsset(orgId: ID!, assetId: ID!, input: AssetInput!): MutationResponse
  saveMeter(orgId: ID!, branchId: ID!, meterId: ID!, input: MeterInput!): MutationResponse
  saveTariff(orgId: ID!, branchId: ID!, serviceType: String!, input: TariffInput!): MutationResponse
  saveProductionLog(orgId: ID!, branchId: ID!, period: String!, input: ProductionLogInput!): MutationResponse
  saveCostCenter(orgId: ID!, input: CostCenterInput!): MutationResponse
  saveAlertRule(orgId: ID!, branchId: ID!, entityId: ID!, alertType: String!, input: AlertRuleInput!): MutationResponse
  saveUser(orgId: ID!, userId: ID!, input: UserInput!): MutationResponse
  saveEmissionFactor(input: EmissionFactorInput!): MutationResponse
  
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  confirmInvoice(sk: String!, input: ConfirmInvoiceInput!): ActionResponse!
  approveInvoice(invoiceId: ID!): Invoice 
}