schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# --- 0. ENUMS ---

enum NodeType {
  ORGANIZATION
  REGION
  BRANCH
  BUILDING
  ASSET
  METER
  COST_CENTER
}

enum InvoiceStatus @aws_api_key @aws_cognito_user_pools {
  UPLOADED
  PROCESSING
  READY_FOR_REVIEW
  FAILED
  CONFIRMED
  POSTED
}

# --- 1. RESPUESTAS UNIFICADAS ---

type MutationResponse {
  success: Boolean!
  message: String
  id: ID
  path: String
  entity: AWSJSON
}

type ActionResponse {
  success: Boolean!
  message: String
  id: String
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  invoiceId: String!
  userId: String!
}

# --- 2. NÚCLEO ANALÍTICO ---

type AnalyticsResponse {
  id: ID!
  metadata: AnalyticsMetadata
  financials_total_spend: Float
  ghg_total_co2e_ton: Float
  energy_intensity_per_m2: Float
  consumption_elec_val: Float
  consumption_gas_val: Float
  advanced_analytics: AWSJSON
  predictive_engine: AWSJSON
  sourceData: AWSJSON 
}

type AnalyticsMetadata {
  entityId: ID
  nodeType: NodeType
  year: String
  month: String
  granularity: String
}

# --- 3. ENTIDADES ---

type Node @aws_cognito_user_pools {
  id: ID!
  parentId: ID
  path: String!  # Formato: #ROOT#BRANCH_ID#BUILDING_ID#
  nodeType: NodeType!
  name: String!
  metadata: AWSJSON # Aquí viven los campos específicos (m2, serialNumber, etc.)
  createdAt: String
  updatedAt: String
}

type Invoice @aws_api_key @aws_cognito_user_pools {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  status: InvoiceStatus
  storageKey: String
  extractedData: AWSJSON
  nodeId: ID # El ID del nodo (Building/Meter) al que pertenece
}

# --- 4. INPUTS COMPACTOS ---

input SaveNodeInput {
  id: ID                # Si viene, es Update. Si no, Create.
  parentId: ID!         # 'ROOT' para el nivel superior
  nodeType: NodeType!
  name: String!
  metadata: AWSJSON     # Aquí metes los campos que antes tenías en 10 inputs diferentes
}

input CreateInvoiceInput {
  storageKey: String!
  serviceType: String!
  nodeId: ID
  internalNote: String
}

input ConfirmInvoiceInput {
  status: InvoiceStatus!
  extracted_data: AWSJSON!
  nodeId: ID
  serviceType: String
}

# --- 5. CONSULTAS (QUERIES) ---

type Query {
  # Obtener el árbol o una rama completa usando el GSI de Path
  getTree(rootNodeId: ID): [Node] @aws_cognito_user_pools
  
  getNode(id: ID!): Node @aws_cognito_user_pools
  
  getInvoice(id: ID!): Invoice @aws_cognito_user_pools
  
  getConsumptionAnalytics(
    entityId: ID!, 
    startDate: String!, 
    endDate: String!
  ): AnalyticsResponse @aws_cognito_user_pools
}

# --- 6. ACCIONES (MUTATIONS) ---

type Mutation {
  # Esta única mutación reemplaza a las 10 anteriores (saveBuilding, saveMeter, etc.)
  saveNode(input: SaveNodeInput!): MutationResponse @aws_cognito_user_pools
  
  # Mover una rama entera del árbol
  moveNode(id: ID!, newParentId: ID!): MutationResponse @aws_cognito_user_pools

  createInvoice(input: CreateInvoiceInput!): Invoice @aws_cognito_user_pools
  
  updateInvoiceStatus(
    id: ID!, 
    status: InvoiceStatus!, 
    extractedData: AWSJSON, 
    message: String
  ): Invoice @aws_api_key @aws_cognito_user_pools

  getPresignedUrl(fileName: String!, fileType: String!, invoiceId: String!): PresignedUrlResponse @aws_cognito_user_pools
}

# --- 7. TIEMPO REAL ---

type Subscription {
  onInvoiceUpdated(id: ID!): Invoice
    @aws_subscribe(mutations: ["updateInvoiceStatus"])
    @aws_api_key @aws_cognito_user_pools
    
  onNodeChanged(parentId: ID): Node
    @aws_subscribe(mutations: ["saveNode", "moveNode"])
    @aws_cognito_user_pools
}