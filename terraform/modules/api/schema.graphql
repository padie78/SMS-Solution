schema {
  query: Query
  mutation: Mutation
}

# --- ANALÍTICA Y KPIs (Reflejando la estructura de DynamoDB) ---

"""
Representa los datos acumulados a nivel Anual, Mensual o Trimestral.
Usa Toneladas para CO2e.
"""
type YearlyKPI {
  id: ID!                     # Mapea a SK (ej: STATS#YEAR#2026)
  totalCo2eTon: Float         # ghg_total_co2e_ton
  totalSpend: Float           # financials_total_spend
  invoiceCount: Int           # trazabilidad_total_invoices
  lastUpdated: String         # last_updated
  
  # Desglose por servicio (Mapping dinámico de prefijos consumption_*)
  byService: ServiceBreakdown
  
  # Mapas de lógica de negocio (Objetos M en DynamoDB)
  normalization: NormalizationKPIs
  environmental: EnvironmentalImpact
  weather: WeatherAdjustment
  metadata: RecordMetadata
}

"""
Representa datos de alta frecuencia (Semanal o Diario).
Usa Kilogramos para CO2e.
"""
type HighFrequencyKPI {
  id: ID!                     # STATS#DAY#11 o STATS#WEEK#2026#W01
  totalCo2eKg: Float          # ghg_total_co2e_kg
  totalSpend: Float           # financials_total_spend
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  # Estos mapas suelen venir vacíos en niveles bajos pero el schema los soporta
  performance: JSON           
}

type ServiceBreakdown {
  # Electricidad
  elec_spend: Float           # consumption_elec_spend
  elec_val: Float             # consumption_elec_val
  elec_unit: String           # consumption_elec_unit
  # Gas
  gas_spend: Float            # consumption_gas_spend
  gas_val: Float              # consumption_gas_val
  gas_unit: String            # consumption_gas_unit
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
}

type EnvironmentalImpact {
  avoided_emissions_ton: Float
  renewable_energy_ratio: Float
}

type WeatherAdjustment {
  weather_normalized_usage: Float
}

type RecordMetadata {
  version: String
  is_fiscal_closed: Boolean
}

# --- ENTIDADES DE OPERACIÓN ---

type Invoice {
  id: ID!                     # SK de la factura INV#...
  vendor: String              # extracted_data.vendor
  invoiceDate: String         # extracted_data.invoice_date
  totalAmount: Float          # extracted_data.total_amount
  emissionsKg: Float          # climatiq_result.co2e
  consumptionVal: Float       # ai_analysis.value
  serviceType: String         # ai_analysis.service_type
  pdfUrl: String              # metadata.s3_key
  aiThoughtProcess: String    # metadata.thought_process.monetary_vs_physical_check
}

# --- RESPUESTAS DE ACCIÓN ---

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

# --- QUERIES ---

type Query {
  # Analytics Ejecutiva (Toneladas)
  getYearlyKPI(year: String!): YearlyKPI
  getQuarterlyKPI(year: String!, quarter: String!): YearlyKPI
  getMonthlyKPI(year: String!, month: String!): YearlyKPI
  
  # Analytics de Operación (Kilogramos)
  getWeeklyKPI(year: String!, week: String!): HighFrequencyKPI
  getDailyKPI(day: String!): HighFrequencyKPI

  # Listados y Auditoría
  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getIntensityReport(year: String!): NormalizationKPIs
}

# --- MUTATIONS ---

type Mutation {
  # Proceso de carga
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  
  # Acciones de auditoría
  approveInvoice(invoiceId: ID!): Invoice
}