schema {
  query: Query
  mutation: Mutation
}

# --- TIPOS DE ANALÍTICA ---

type YearlyKPI {
  id: ID!
  totalCo2eTon: Float
  totalSpend: Float
  invoiceCount: Int
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  environmental: EnvironmentalImpact
  weather: WeatherAdjustment
  metadata: RecordMetadata
}

type HighFrequencyKPI {
  id: ID!
  totalCo2eKg: Float
  totalSpend: Float
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  performance: AWSJSON
}

# --- COMPONENTES ---

type ServiceBreakdown {
  elec_spend: Float
  elec_val: Float
  elec_unit: String
  gas_spend: Float
  gas_val: Float
  gas_unit: String
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
}

type EnvironmentalImpact {
  avoided_emissions_ton: Float
  renewable_energy_ratio: Float
}

type WeatherAdjustment {
  weather_normalized_usage: Float
}

type RecordMetadata {
  version: String
  is_fiscal_closed: Boolean
}

# --- ENTIDADES ---

type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  aiThoughtProcess: String
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

type ConfigurationResponse {
  success: Boolean!
  message: String
}

# Inputs para Organización
input OrgConfigInput {
  orgId: ID!
  name: String!
  taxId: String!
  hqAddress: String!
  gasConversion: Float
  minConfidence: Float
  currency: String
}

# Inputs para Sucursal
input BranchConfigInput {
  orgId: ID!
  branchId: String!
  name: String!
  buildings: [String]
  areas: [String]
  assetId: String!
  climatiqId: String!
}

# Inputs para Usuario
input UserProfileInput {
  orgId: ID!
  userId: ID!
  fullName: String!
  email: String!
  language: String!
  role: String!
}

# 1. Definimos el objeto de entrada
input CreateAssetInput {
  name: String!
  type: String!
  description: String
  branchId: String
  building: String
  area: String
  climatiqId: String
}

# --- CONSULTAS (QUERIES) ---

type Query {
  # KPIs Jerárquicos
  getYearlyKPI(year: String!): YearlyKPI
  getQuarterlyKPI(year: String!, quarter: String!): YearlyKPI
  getMonthlyKPI(year: String!, month: String!): YearlyKPI
  getWeeklyKPI(year: String!, week: String!): HighFrequencyKPI
  getDailyKPI(day: String!): HighFrequencyKPI

  # Comparativas y Metas (Lo que Terraform estaba buscando)
  getYearOverYear(year: String!, month: String!): AWSJSON
  getGoalTracking(year: String!): AWSJSON
  
  # Auditoría
  getIntensityReport(year: String!): NormalizationKPIs
  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getVendorRanking(year: String!, limit: Int): AWSJSON
}

# --- ACCIONES (MUTATIONS) ---

type Mutation {
  # --- Existentes ---
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  approveInvoice(invoiceId: ID!): Invoice
  createAsset(input: CreateAssetInput!): AWSJSON

  # --- AGREGAR ESTOS (Para limpiar los errores de Terraform) ---
  deleteAsset(id: ID!): AWSJSON
  createBranch(name: String!, location: String): AWSJSON
  updateBranch(id: ID!, name: String, location: String): AWSJSON

  saveOrgConfig(input: OrgConfigInput!): ConfigurationResponse
  saveBranchConfig(input: BranchConfigInput!): ConfigurationResponse
  saveUserProfile(input: UserProfileInput!): ConfigurationResponse
}