schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# --- 0. ENUMS ---

enum InvoiceStatus {
  UPLOADED
  PROCESSING
  READY_FOR_REVIEW
  FAILED
  CONFIRMED
  POSTED
}

# --- 1. RESPUESTAS Y CONTROL ---

type MutationResponse {
  success: Boolean!
  message: String
  orgId: ID
  branchId: ID
  buildingId: ID
  ccId: ID
  assetId: ID
  meterId: ID
  tariffId: ID
  logKey: ID
  factorKey: ID
  service: String
  entity: AWSJSON
}

type ActionResponse {
  success: Boolean!
  message: String
  id: String
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  invoiceId: String!  # Cambiado de userId a invoiceId para el handshake inicial
  userId: String!     # Mantener userId por trazabilidad si es necesario
}

type InvoiceIAProcessingResponse {
  success: Boolean!
  message: String
  vendor: String
  date: String
  total: Float
  consumption: Float
  co2e: Float
  currency: String
  category: String
  confidence: Float
}

# --- 2. NÚCLEO ANALÍTICO ---

type AnalyticsResponse {
  id: ID!
  metadata: AnalyticsMetadata
  financials_total_spend: Float
  ghg_total_co2e_ton: Float
  ghg_total_co2e_kg: Float
  cost_per_m2: Float
  trazabilidad_total_invoices: Int
  last_updated: String
  budget_deviation_pct: Float
  target_deviation_pct: Float
  energy_intensity_per_m2: Float
  consumption_gas_val: Float
  consumption_elec_val: Float
  energy_intensity_index: Float
  phantom_load_kwh: Float
  advanced_analytics: AdvancedAnalytics
  predictive_engine: PredictiveEngine
  management_reporting: ManagementReporting
  regulatory_compliance: RegulatoryCompliance
  sourceData: AWSJSON 
}

type AnalyticsMetadata {
  orgId: ID
  year: String
  quarter: String
  month: String
  week: String
  day: String
  granularity: String
  lastUpdated: String
}

type AdvancedAnalytics {
  data_quality_score: String
  emission_factor_source: String
  energy_intensity_index: Float
  renewable_energy_mix_pct: Float
  transition_risk_scoring: AWSJSON
  energy_source_mix: AWSJSON
  data_reliability_pct: Float
}

type PredictiveEngine {
  current_vs_target_pct: Float
  financial_risk_exposure: Float
  forecast_year_end_co2: Float
  target_annual_limit: Float
  projected_gap_vs_target: Float
}

type ManagementReporting {
  carbon_intensity_revenue: Float
  reporting_period_status: String
}

type RegulatoryCompliance {
  methodology: String
  reporting_standard: String
  scope_category: String
}

# --- 3. ENTIDADES ---

type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  status: InvoiceStatus
  storageKey: String
  extractedData: AWSJSON
  aiThoughtProcess: String
  lastUpdated: String
  buildingId: ID
  meterId: ID
  costCenterId: ID
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
  intensity_per_production_unit: Float 
}

# --- 4. INPUTS ---

input CreateInvoiceInput {
  storageKey: String!
  serviceType: String!
  buildingId: ID
  meterId: ID
  costCenterId: ID
  internalNote: String
  status: InvoiceStatus
}

input BillingPeriodInput {
  start: String!
  end: String!
}

# Este input debe coincidir con lo que enviamos desde handleConfirm()
input ConfirmInvoiceInput {
  status: InvoiceStatus!
  extracted_data: AWSJSON!       # Donde guardamos el JSON de la IA corregido
  buildingId: ID
  meterId: ID
  costCenterId: ID
  serviceType: String
  notes: String
}

# Otros inputs se mantienen igual por brevedad...
# OrgConfigInput, BranchInput, BuildingInput, AssetInput, etc.

# --- 5. CONSULTAS (QUERIES) ---

type Query {
  getInvoice(id: ID!): Invoice
  getPrecalculatedKPI(year: String!, quarter: String, month: String, week: String, day: String): AnalyticsResponse
  getConsumptionAnalytics(entityId: ID!, type: String!, startDate: String!, endDate: String!): AnalyticsResponse
  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getCostCenters: [AWSJSON]
  getTariffsByBranch(branchId: ID!): [AWSJSON]
  getIntensityReport(year: String!): NormalizationKPIs
}

# --- 6. ACCIONES (MUTATIONS) ---

type Mutation {
  # Registro inicial
  createInvoice(input: CreateInvoiceInput!): Invoice
  
  # Usado por la Lambda de IA para avisar al Front
  updateInvoiceStatus(
    id: ID!, 
    status: InvoiceStatus!, 
    extractedData: AWSJSON,
    message: String
  ): Invoice

  # Pipeline de Facturación e IA
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  
  # El método que llama el Step 2 al finalizar
  confirmInvoice(id: ID!, input: ConfirmInvoiceInput!): ActionResponse!
  
  approveInvoice(invoiceId: ID!): Invoice 
  
  # Otros métodos de configuración...
}

# --- 7. TIEMPO REAL (SUBSCRIPTIONS) ---

type Subscription {
  # El ID es el invoiceId que guardamos en el Signal
  onInvoiceUpdated(id: ID!): Invoice
    @aws_subscribe(mutations: ["updateInvoiceStatus"])
}