schema {
  query: Query
  mutation: Mutation
}

# --- 1. RESPUESTAS ---
type MutationResponse {
  success: Boolean!
  message: String
  orgId: ID
  branchId: ID
  buildingId: ID
  ccId: ID
  assetId: ID
  meterId: ID
  service: String
  alertKey: String
  userId: ID
  logKey: String
  factorKey: String
  entity: AWSJSON
}

type ActionResponse {
  success: Boolean!
  message: String
  id: String
}

type PresignedUrlResponse {
  uploadURL: String!
  key: String!
  userId: String!
}

# --- 2. ENTIDADES ---
type Invoice {
  id: ID!
  vendor: String
  invoiceDate: String
  totalAmount: Float
  emissionsKg: Float
  consumptionVal: Float
  serviceType: String
  pdfUrl: String
  aiThoughtProcess: String
  status: String
  approvedBy: String
  approvedAt: String
  lastUpdated: String
}

type YearlyKPI {
  id: ID!
  totalCo2eTon: Float
  totalSpend: Float
  invoiceCount: Int
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  environmental: EnvironmentalImpact
  weather: WeatherAdjustment
  metadata: RecordMetadata
}

type HighFrequencyKPI {
  id: ID!
  totalCo2eKg: Float
  totalSpend: Float
  lastUpdated: String
  byService: ServiceBreakdown
  normalization: NormalizationKPIs
  performance: AWSJSON
}

type ServiceBreakdown {
  elec_spend: Float
  elec_val: Float
  elec_unit: String
  gas_spend: Float
  gas_val: Float
  gas_unit: String
}

type NormalizationKPIs {
  intensity_per_revenue: Float
  intensity_per_sqm: Float
  intensity_per_production_unit: Float 
}

type EnvironmentalImpact {
  avoided_emissions_ton: Float
  renewable_energy_ratio: Float
}

type WeatherAdjustment {
  weather_normalized_usage: Float
}

type RecordMetadata {
  version: String
  is_fiscal_closed: Boolean
}

# --- 3. INPUTS ---

input OrgConfigInput {
  name: String
  taxId: String
  hqAddress: String
  totalGlobalM2: Float
  industrySector: String
  currency: String
  reportingCurrency: String
  minConfidence: Float
  gasConversion: Float
  referenceUnitRate: Float
  carbonShadowPrice: Float
  baselineYear: Int
  ghgMethodology: String
  reductionTarget: Float
  targetYear: Int
  activeBranches: Int
  totalAssets: Int
  subscriptionPlan: String
}

input BranchInput {
  branchId: String!
  name: String!
  m2Surface: Float
  m3Volume: Float
  manager: String
  facilityType: String
  timezone: String
  geoLocation: String
  energyTarget: Float
  carbonBudget: Float
  baseloadThreshold: Float
  maxPowerCapacity: Float
  operatingHours: String
  emissionFactor: Float
  isIsoCertified: Boolean
  lastAuditDate: String
  region: String
  criticality: String
  primaryCC: String
  userId: String
}

input BuildingInput {
  name: String!
  type: String
  totalM2: Float
  usageType: String
  isConditioned: Boolean
  mainAssetId: String
}

input CostCenterInput {
  id: String
  name: String
  accountingCode: String
  managerId: String
  branchId: String
  method: String
  percentage: Float
  operatingHours: Int
  isVatExempt: Boolean
  annualBudget: Float
  thresholds: [Int]
  budgetPolicy: String
  glMapping: String
}

input AssetInput {
  name: String
  category: String
  status: String
  criticality: String
  nominalPower: Float
  efficiencyClass: String
  powerFactor: Float
  meterId: String
  iotName: String
  branchId: String
  buildingId: String
  costCenterId: String
  geoXyz: String
}

input TariffInput {
  providerName: String
  contractId: String
  accountNumber: String
  supportContact: String
  billingCycle: String
  currency: String
  pricingModel: String
  baseRate: Float
  peakRate: Float
  offPeakRate: Float
  fixedFee: Float
  reactivePenalty: Float
  taxes: [TaxInput]
  contractedPower: Float
  voltageLevel: String
  meterId: String
  validFrom: String
  validTo: String
  userId: String
}

input TaxInput {
  name: String
  rate: Float
}

input AlertRuleInput {
  name: String
  description: String
  status: String
  priority: String
  metricSource: String
  operator: String
  threshold: Float
  durationMins: Int
  hysteresis: Float
  channels: [String]
  recipients: [String]
  escalationPolicy: String
  suppressionMins: Int
  autoIncident: Boolean
  remediation: String
}

input UserInput {
  fullName: String
  email: String
  position: String
  cognitoSub: String
  role: String
  permissions: [String]
  accessScope: String
  defaultDashboard: String
  language: String
  emailAlerts: Boolean
  smsAlerts: Boolean
}

input ProductionLogInput {
  units: Float
  unitType: String
  shiftMode: String
  efficiency: Float
  waste: Float
  downtime: Float
  activeLines: Int
  temperature: Float
  humidity: Float
  rawMaterialBatch: String
  activeM2: Float
}

input EmissionFactorInput {
  name: String
  year: Int
  regionCode: String
  regionName: String
  source: String
  activityType: String
  activityId: String
  unit: String
  value: Float
  co2: Float
  ch4: Float
  n2o: Float
  scope: String
  category: String
  methodology: String
  uncertainty: Float
  validFrom: String
  validTo: String
  isLatest: Boolean
}

input MeterInput {
  name: String
  serialNumber: String
  manufacturer: String
  model: String
  firmware: String
  iotName: String
  protocol: String
  type: String
  isMain: Boolean
  parentMeterId: String
  scalingFactor: Float
  unit: String
  buildingId: String
  location: String
}

input ConfirmInvoiceInput {
  service_type: String!
  total_magnitude_sum: Float!
  billing_period: BillingPeriodInput!
  extracted_data: SimplifiedDataInput!
}

input BillingPeriodInput {
  start: String!
  end: String!
}

input SimplifiedDataInput {
  vendor_name: String
  vendor_tax_id: String
  invoice_number: String
  total_amount: Float
  tax_amount: Float
  base_amount: Float
  currency: String
}

# --- 4. CONSULTAS (QUERIES) ---
type Query {
  getYearlyKPI(year: String!): YearlyKPI
  getQuarterlyKPI(year: String!, quarter: String!): YearlyKPI
  getMonthlyKPI(year: String!, month: String!): YearlyKPI
  getWeeklyKPI(year: String!, week: String!): HighFrequencyKPI
  getDailyKPI(day: String!): HighFrequencyKPI
  getInvoicesByPeriod(year: String!, month: String): [Invoice]
  getIntensityReport(year: String!): NormalizationKPIs
  getCostCenters: [AWSJSON]
  getTariffsByBranch(branchId: ID!): [AWSJSON]
}

# --- 5. ACCIONES (MUTATIONS) ---
type Mutation {
  # Infraestructura Base
  saveOrgConfig(orgId: ID!, input: OrgConfigInput!): MutationResponse
  createBranch(orgId: ID!, input: BranchInput!): MutationResponse
  saveBuilding(orgId: ID!, branchId: ID!, buildingId: ID!, input: BuildingInput!): MutationResponse
  saveCostCenter(orgId: ID!, input: CostCenterInput!): MutationResponse
  
  # Activos y Medición
  saveAsset(orgId: ID!, assetId: ID!, input: AssetInput!): MutationResponse
  saveMeter(orgId: ID!, branchId: ID!, meterId: ID!, input: MeterInput!): MutationResponse
  
  # Finanzas y Reglas
  saveTariff(orgId: ID!, branchId: ID!, serviceType: String!, input: TariffInput!): MutationResponse
  saveAlertRule(orgId: ID!, branchId: ID!, entityId: ID!, alertType: String!, input: AlertRuleInput!): MutationResponse
  
  # Usuarios y Logs
  saveUser(orgId: ID!, userId: ID!, input: UserInput!): MutationResponse
  saveProductionLog(orgId: ID!, branchId: ID!, period: String!, input: ProductionLogInput!): MutationResponse
  updateProductionLog(orgId: ID!, branchId: ID!, period: String!, input: ProductionLogInput!): MutationResponse
  saveEmissionFactor(input: EmissionFactorInput!): MutationResponse

  # Procesamiento de Facturas
  getPresignedUrl(fileName: String!, fileType: String!): PresignedUrlResponse
  approveInvoice(invoiceId: ID!): Invoice 
  confirmInvoice(sk: String!, input: ConfirmInvoiceInput!): ActionResponse!
}